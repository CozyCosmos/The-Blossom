<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0E1A13" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Blossom" />
<title>The Blossom</title>
<style>
/* ============================================================ THE BLOSSOM — v3 (cozy) */
:root{
  --green:#1B4332; --green-soft:#2D6A4F; --pink:#F4A4B0; --gold:#D4AC60;
  --bg:#0E1A13; --bg-2:#14241b; --card:#172c20; --card-2:#1d3527; --line:#2a4534;
  --text:#ECF3EE; --muted:#93B6A4; --muted-2:#739484;
  --physical:#52B788; --mental:#5B8DEF; --social:#B07CE8; --emotional:#E8B04B;
  --radius:20px; --radius-sm:13px; --shadow:0 10px 34px rgba(0,0,0,.34); --tab-h:64px;
}
[data-theme="light"]{
  --bg:#F7F1E8; --bg-2:#f0e8db; --card:#ffffff; --card-2:#faf4ea;
  --line:#e6dccb; --text:#22302a; --muted:#6e8074; --muted-2:#90a094;
  --shadow:0 10px 26px rgba(70,55,30,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
/* fixed full-viewport gradient layer so it never "cuts" while scrolling */
body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:var(--app-gradient, radial-gradient(140% 100% at 50% -5%, var(--grad-top, #1a3322) 0%, var(--bg) 60%));}
[data-theme="light"]{--grad-top:#fffaf0;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em;}
.serif{font-family:'Georgia','Times New Roman',serif;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));}
.screen{flex:1;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.appbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:linear-gradient(180deg, color-mix(in srgb,var(--bg) 92%,transparent), color-mix(in srgb,var(--bg) 58%,transparent));
  padding:16px 18px 13px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);}
.appbar .title{flex:1;min-width:0;}
.appbar .title h2{font-size:23px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iconbtn{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:var(--card);border:1px solid var(--line);font-size:18px;flex:none;}
.iconbtn:active{transform:scale(.94);}
.backbtn{font-size:15px;color:var(--pink);font-weight:600;display:flex;align-items:center;gap:4px;flex:none;}

.content{padding:16px 16px 30px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.card.tight{padding:12px 14px;}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 0;}
.section-h h3{font-size:16px;}.section-h .add{color:var(--pink);font-weight:700;font-size:14px;}
.muted{color:var(--muted);}.small{font-size:13px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--card-2);border:1px solid var(--line);}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom);background:linear-gradient(180deg, rgba(14,26,19,.2), var(--bg) 55%);}
[data-theme="light"] .tabbar{background:linear-gradient(180deg, rgba(247,241,232,.2), var(--bg) 55%);}
.tabbar .inner{max-width:680px;width:100%;display:flex;}
.tab{flex:1;height:var(--tab-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;position:relative;}
.tab .ic{font-size:22px;line-height:1;transition:transform .2s;}
.tab.active{color:var(--text);}.tab.active .ic{transform:translateY(-2px) scale(1.12);}
.tab.active::before{content:"";position:absolute;top:8px;width:34px;height:34px;border-radius:50%;background:radial-gradient(circle, rgba(244,164,176,.22), transparent 70%);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:14px;font-weight:700;font-size:15px;background:var(--card-2);border:1px solid var(--line);}
.btn.primary{background:linear-gradient(135deg,var(--green-soft),color-mix(in srgb,var(--green-soft) 72%,#000));border-color:var(--green-soft);color:#fff;}
.btn.pink{background:linear-gradient(135deg,var(--pink),color-mix(in srgb,var(--pink) 82%,#000));color:#2a1015;border:none;}
.btn.gold{background:linear-gradient(135deg,var(--gold),color-mix(in srgb,var(--gold) 82%,#000));color:#2a2008;border:none;}
.btn.block{width:100%;}.btn.sm{padding:8px 12px;font-size:13px;border-radius:11px;}
.btn:active{transform:scale(.97);}
.fab{position:fixed;right:calc(50% - 320px);bottom:calc(var(--tab-h) + 18px + env(safe-area-inset-bottom));z-index:45;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--gold));color:#2a1015;font-size:28px;display:grid;place-items:center;box-shadow:0 10px 24px rgba(0,0,0,.4);}
@media(max-width:712px){.fab{right:18px;}}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);}
.input,textarea.input,select.input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:15px;color:var(--text);outline:none;transition:border .15s;}
.input:focus{border-color:var(--green-soft);}
textarea.input{resize:vertical;min-height:80px;line-height:1.5;}
.row{display:flex;gap:10px;}.row>*{flex:1;}

.list-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}
.check{width:24px;height:24px;border-radius:8px;border:2px solid var(--muted-2);display:grid;place-items:center;flex:none;font-size:14px;transition:.15s;}
.check.on{background:var(--green-soft);border-color:var(--green-soft);color:#fff;}
.check.round{border-radius:50%;}
.li-text{flex:1;font-size:15px;}.li-text.done{text-decoration:line-through;color:var(--muted);}
.tag-dot{width:9px;height:9px;border-radius:50%;flex:none;}

.hstrip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 8px;scroll-snap-type:x mandatory;}
.hstrip::-webkit-scrollbar{display:none;}
.habit-card{scroll-snap-align:start;min-width:150px;background:var(--card-2);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.habit-card .hn{font-weight:700;font-size:15px;}
.streak{font-size:13px;color:var(--gold);font-weight:700;}
.checkin{margin-top:4px;width:100%;padding:9px;border-radius:11px;font-weight:700;font-size:14px;background:var(--green-soft);color:#fff;}
.checkin.done{background:transparent;color:var(--physical);border:1px solid var(--physical);}

.goal-card{background:var(--card-2);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.bar{height:8px;border-radius:99px;background:var(--bg-2);overflow:hidden;}.bar>i{display:block;height:100%;border-radius:99px;}.bar.thin{height:6px;}

.ring{position:relative;flex:none;}.ring svg{transform:rotate(-90deg);}.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;}

.slider-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
.slider-row label{width:108px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
.slider-row output{width:46px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:99px;background:var(--line);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pink);border:3px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.4);}

.clock b{font-size:15px;}
.quote-card{display:flex;align-items:flex-start;gap:10px;}.quote-card .q{flex:1;font-style:italic;line-height:1.5;font-size:15px;}

.lvl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lvl-tile{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;gap:5px;align-items:center;}
.lvl-tile .em{font-size:20px;}.lvl-tile .lv{font-weight:800;font-size:13px;}.lvl-tile .bar{width:100%;}
.level-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:800;background:var(--bg-2);border:1px solid var(--line);}

.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding-bottom:4px;}
.cal-cell{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg-2);border:1.5px solid transparent;font-size:14px;font-weight:600;position:relative;}
.cal-cell.other{opacity:.32;}.cal-cell.today{color:var(--gold);}
.cal-cell.sel{background:var(--green-soft);color:#fff;border-color:var(--gold);}
.cal-dots{display:flex;gap:3px;height:6px;}.cal-dots i{width:5px;height:5px;border-radius:50%;}

.agenda-item{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line);}
.agenda-item:last-child{border-bottom:none;}
.agenda-item .ai-bar{width:4px;align-self:stretch;border-radius:3px;flex:none;}
.agenda-item .ai-b{flex:1;}.agenda-item .ai-b b{font-size:14px;}.agenda-item .ai-b small{color:var(--muted);}

.timeblock{display:flex;gap:10px;align-items:stretch;}
.tb-time{width:54px;flex:none;font-size:12px;color:var(--muted);font-weight:700;padding-top:2px;}
.tb-body{flex:1;border-left:2px solid var(--line);padding:0 0 14px 12px;}
.tb-event{border-radius:12px;padding:10px 12px;font-size:14px;font-weight:600;color:#fff;margin-bottom:6px;}

.daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.daynav .d{flex:1;text-align:center;}.daynav .d b{font-size:16px;}.daynav .d small{display:block;color:var(--muted);}

.flower-wrap{display:grid;place-items:center;padding:6px 0 10px;}
.petal{cursor:pointer;transition:filter .2s;}.petal:active{filter:brightness(1.2);}
.aspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.aspect-tile{border-radius:18px;padding:15px;display:flex;flex-direction:column;gap:5px;border:1px solid var(--line);position:relative;overflow:hidden;}
.aspect-tile .em{position:absolute;right:10px;top:8px;font-size:24px;opacity:.55;}
.aspect-tile .lv{font-size:24px;font-weight:800;}.aspect-tile .nm{font-weight:700;}
.aspect-add{border:1.5px dashed var(--line);border-radius:18px;display:grid;place-items:center;min-height:96px;color:var(--muted);font-weight:700;background:transparent;}

.skill-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);}
.skill-row:last-child{border-bottom:none;}
.skill-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:none;background:var(--card-2);}
.skill-row .chev{color:var(--muted);font-size:20px;}

.body-zone{cursor:pointer;transition:.15s;}.body-zone:active{opacity:.7;}
.bodytoggle{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:12px;width:max-content;margin:0 auto 8px;}
.bodytoggle button{padding:7px 16px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted);}
.bodytoggle button.on{background:var(--green-soft);color:#fff;}

.crumbs{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:12px;color:var(--muted);padding:0 2px 6px;}
.crumbs a{color:var(--pink);font-weight:600;}.crumbs span.sep{opacity:.5;}
.page-head{display:flex;align-items:center;gap:10px;}
.page-emoji{font-size:30px;width:48px;height:48px;border-radius:13px;display:grid;place-items:center;background:var(--bg-2);border:1px solid var(--line);flex:none;}
.page-title{flex:1;font-size:25px;font-weight:800;border:none;background:transparent;outline:none;padding:2px 0;}

/* doc editor (Notion + Docs feel) */
.doctoolbar{position:sticky;top:62px;z-index:20;display:flex;gap:3px;flex-wrap:wrap;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:6px;margin:10px 0;}
.doctoolbar button{min-width:34px;height:34px;padding:0 9px;border-radius:9px;font-size:14px;font-weight:700;color:var(--muted);background:transparent;}
.doctoolbar button:active{background:var(--card-2);}
.doctoolbar .sep{width:1px;background:var(--line);margin:4px 2px;}
.docedit{min-height:78vh;outline:none;font-size:16px;line-height:1.65;padding:6px 2px 40vh;cursor:text;}
.docedit:empty:before{content:attr(data-ph);color:var(--muted-2);}
.docedit:focus{outline:none;}
.docedit h1{font-size:24px;margin:14px 0 4px;}
.docedit h2{font-size:19px;margin:12px 0 4px;}
.docedit blockquote{border-left:3px solid var(--gold);margin:8px 0;padding:2px 0 2px 12px;color:var(--muted);font-style:italic;}
.docedit ul,.docedit ol{margin:6px 0;padding-left:24px;}
.docedit li{margin:3px 0;}
.docedit hr{border:none;border-top:1px solid var(--line);margin:14px 0;}
.docedit img{max-width:100%;border-radius:12px;margin:8px 0;display:block;}
.docedit a.subpage{display:inline-flex;align-items:center;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:3px 10px;font-weight:600;color:var(--text);text-decoration:none;cursor:pointer;margin:2px 0;}
.docedit .todo-line{display:flex;align-items:flex-start;gap:8px;margin:4px 0;}
.docedit .todo-line input{margin-top:5px;width:17px;height:17px;accent-color:var(--green-soft);flex:none;}

.note-tile{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;background:var(--card-2);border:1px solid var(--line);margin-bottom:8px;}
.note-tile .nt-ic{font-size:18px;}.note-tile .nt-body{flex:1;min-width:0;}
.note-tile .nt-body b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-tile .nt-body small{color:var(--muted);}.pin{color:var(--gold);}

.steps{display:flex;gap:6px;margin-bottom:16px;}.steps i{flex:1;height:5px;border-radius:99px;background:var(--line);}.steps i.on{background:var(--gold);}
.step-letter{font-size:54px;font-weight:800;line-height:1;color:var(--gold);opacity:.25;position:absolute;right:14px;top:6px;}

.empty{text-align:center;color:var(--muted);padding:22px 10px;font-size:14px;}
.divider{height:1px;background:var(--line);margin:4px 0;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;background:var(--bg-2);border:1px solid var(--line);}
.chip.on{background:var(--green-soft);border-color:var(--green-soft);color:#fff;}
.modal-back{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);display:grid;place-items:end center;backdrop-filter:blur(3px);}
.sheet{width:100%;max-width:680px;max-height:88vh;overflow:auto;background:var(--bg-2);border-radius:24px 24px 0 0;padding:18px 18px calc(26px + env(safe-area-inset-bottom));border:1px solid var(--line);animation:slideup .28s ease;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.sheet h2{font-size:20px;margin-bottom:14px;}
.grabber{width:42px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 14px;}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;}
.menu-item:last-child{border:none;}.menu-item .mi-ic{width:24px;text-align:center;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--tab-h) + 26px);z-index:100;background:var(--green-soft);color:#fff;padding:11px 18px;border-radius:13px;font-weight:600;font-size:14px;box-shadow:var(--shadow);animation:fade .2s;}
.logline{display:flex;justify-content:space-between;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px;}.logline:last-child{border:none;}
.kpi{display:flex;gap:10px;}.kpi .k{flex:1;background:var(--bg-2);border-radius:13px;padding:12px;text-align:center;}.kpi .k b{font-size:22px;display:block;}.kpi .k small{color:var(--muted);font-size:11px;}
.xpfly{position:fixed;z-index:120;font-weight:800;color:var(--gold);pointer-events:none;animation:xpfly 1s ease forwards;}
@keyframes xpfly{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
/* calendar v4 */
.calview{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:11px;width:max-content;margin:0 auto 12px;}
.calview button{padding:6px 16px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted);}
.calview button.on{background:var(--green-soft);color:#fff;}
.weekstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.weekday{border-radius:12px;padding:8px 2px;text-align:center;background:var(--bg-2);border:1.5px solid transparent;cursor:pointer;}
.weekday small{display:block;font-size:10px;color:var(--muted);font-weight:700;}
.weekday b{font-size:16px;}
.weekday.today b{color:var(--gold);}
.weekday.sel{background:var(--green-soft);border-color:var(--gold);color:#fff;}
.weekday.sel small{color:#dfeee6;}
.weekday .wd-dots{display:flex;gap:2px;justify-content:center;height:6px;margin-top:3px;}
.weekday .wd-dots i{width:5px;height:5px;border-radius:50%;}
.tl{position:relative;margin-top:6px;}
.tl-hour{position:relative;height:48px;border-top:1px solid var(--line);}
.tl-hour span{position:absolute;left:0;top:-8px;font-size:11px;color:var(--muted);font-weight:700;background:var(--card);padding-right:6px;}
.tl-track{position:absolute;left:48px;right:0;top:0;bottom:0;}
.tl-event{position:absolute;left:0;right:6px;border-radius:10px;padding:5px 9px;font-size:12.5px;font-weight:600;color:#fff;overflow:hidden;box-shadow:var(--shadow);}
.tl-event small{opacity:.85;font-weight:500;}
/* doc colors + details */
.docedit details{border:1px solid var(--line);border-radius:10px;padding:4px 10px;margin:6px 0;background:var(--bg-2);}
.docedit summary{cursor:pointer;font-weight:700;outline:none;}
.docedit details[open]>summary{margin-bottom:6px;}
.swatch-grid{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 14px;}
.swatch{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);cursor:pointer;}
/* alarms & timers */
.bigclock{font-size:40px;font-weight:800;text-align:center;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
.timer-ring{display:grid;place-items:center;padding:6px 0;}
.alarm-fire{position:fixed;inset:0;z-index:130;background:rgba(8,16,11,.92);display:grid;place-items:center;text-align:center;backdrop-filter:blur(6px);}
.alarm-fire .af-card{padding:30px;}
.alarm-fire .af-t{font-size:52px;font-weight:800;}
.alarm-fire .af-l{font-size:20px;color:var(--gold);margin:6px 0 24px;}
.maptile{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--card-2);border:1px solid var(--line);margin-bottom:8px;cursor:pointer;}
.maptile .mt-ic{font-size:22px;}
/* pickers */
.clockpick{display:flex;gap:6px;align-items:center;}
.clockpick select{flex:0 1 auto;min-width:62px;text-align:center;}
.clockpick small{color:var(--muted);font-weight:600;}
.aspskill .asp-skills{margin-top:2px;}
/* notion toggle */
.docedit .ntoggle{margin:6px 0;}
.docedit .ntg-head{display:flex;align-items:flex-start;gap:4px;font-weight:700;}
.docedit .ntg-fold{color:var(--gold);font-size:13px;transition:transform .15s;flex:none;width:18px;text-align:center;padding-top:2px;}
.docedit .ntoggle.folded .ntg-fold{transform:rotate(-90deg);}
.docedit .ntg-title{flex:1;}
.docedit .ntg-body{padding-left:20px;color:var(--text);}
.docedit .ntoggle.folded .ntg-body{display:none;}
/* week grid (google-style) */
.wgrid-head{display:grid;grid-template-columns:30px repeat(7,1fr);gap:2px;margin-bottom:2px;}
.wgh{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:3px 0;border-radius:8px;cursor:pointer;}
.wgh.today{color:var(--gold);}
.wgh.sel{background:var(--green-soft);color:#fff;}
.wgh b{display:block;font-size:14px;}
.wgrid{display:flex;gap:0;}
.wg-times{width:30px;flex:none;}
.wg-time{height:42px;position:relative;font-size:9px;color:var(--muted);}
.wg-time span{position:absolute;top:-6px;right:3px;}
.wg-days{flex:1;display:grid;grid-template-columns:repeat(7,1fr);}
.wg-day{position:relative;border-left:1px solid var(--line);}
.wg-ev{position:absolute;left:1px;right:1px;border-radius:5px;padding:2px 3px;font-size:8.5px;line-height:1.15;color:#fff;overflow:hidden;font-weight:600;}
.wg-allday{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;min-height:8px;padding:2px 0;}
.wg-allday i{width:5px;height:5px;border-radius:50%;}
/* graph */
.gwrap{overflow-x:auto;}
.graph-axis{font-size:9px;fill:var(--muted);}
/* stopwatch */
.swatch-time{font-size:38px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.02em;}
/* routine editor */
.ritem{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ritem .ri-t{flex:1;}
.lbl-edit{cursor:pointer;text-decoration:underline dotted var(--gold);text-underline-offset:3px;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="app"><div id="appbar"></div><div id="screen" class="screen"></div></div>
<button id="fab" class="fab" style="display:none">＋</button>
<nav class="tabbar"><div class="inner" id="tabbar"></div></nav>
<div id="modal-root"></div>

<script>
"use strict";
/* ===== 1. UTIL ===== */
const $=(s,r=document)=>r.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>new Date(d+'T00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
const fmtShort=d=>new Date(d+'T00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'});
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);
const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1900);}
function dateAdd(ds,n){const d=new Date(ds+'T00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

const ASPECT_DEFAULTS={
  physical:{name:'Physical',emoji:'💪',hex:'#52B788',builtin:true,skills:['Strength','Endurance','Flexibility & Mobility','Nutrition','Rest & Recovery','Skill Development']},
  mental:{name:'Mental',emoji:'🧠',hex:'#5B8DEF',builtin:true,skills:['Focus & Discipline','Critical Thinking','Learning & Knowledge','Time Management','Identity & Self-Development']},
  social:{name:'Social',emoji:'🤝',hex:'#B07CE8',builtin:true,skills:['Communication','Values','Connection','Collaboration','Presence & Reputation']},
  emotional:{name:'Emotional',emoji:'💗',hex:'#E8B04B',builtin:true,skills:['Self-Awareness','Resilience','Mindfulness','Emotional Intelligence','Purpose & Gratitude']},
};
const ASPECT_PALETTE=['#E07A5F','#3DCCC7','#F2CC8F','#9B5DE5','#48BFE3','#F15BB5','#80B918','#FF8FAB'];
const AS=k=>S.aspects[k]||{name:k,emoji:'🌱',hex:'var(--muted)',skills:[]};
const aspectKeys=()=>S.aspectOrder.filter(k=>S.aspects[k]);
const aspectHex=k=>(S.aspects[k]||{}).hex||'var(--muted)';

const QUOTES=["Help your future blossom like this cosmos."];

/* ===== 2. STATE ===== */
const KEY='blossom_data_v1';
const DEFAULT=()=>({
  meta:{version:3,created:todayStr()},
  profile:{name:'',purpose:'',values:[],quote:'Help your future blossom like this cosmos.'},
  settings:{theme:'dark',weeklyReviewDay:0,particles:['flowers'],dayStart:0,dayEnd:24,colors:{},gradient:'',preset:'dark',customParticles:[],editLabels:false,appName:'The Blossom'},
  aspects:JSON.parse(JSON.stringify(ASPECT_DEFAULTS)),
  aspectOrder:['physical','mental','social','emotional'],
  notes:[], todos:[], habits:[], goals:[], alarms:[], timers:[], events:[], routines:[],
  trackers:[{id:'mood',name:'Mood',emoji:'😊',max:10,color:'#F4A4B0'},{id:'energy',name:'Energy',emoji:'⚡',max:10,color:'#D4AC60'},{id:'focus',name:'Focus',emoji:'🎯',max:10,color:'#52B788'}],
  trackerLog:{}, journal:[], body:{view:'front',muscles:{}}, people:[], reviews:[], xp:{}, labels:{},
  home:{order:['overview','growth','today','notes','habits','goals','trackers','journal','tools'],hidden:[],custom:[]},
});
const HOME_DEFAULT_ORDER=['overview','growth','today','notes','habits','goals','trackers','journal','tools'];
const SECTION_LABELS={overview:'Overview',growth:'Growth',today:'Today',notes:'Notes',habits:'Habits',goals:'Goals',trackers:'Trackers',journal:'Journal',tools:'Records & Alarms'};
let S=load();
function load(){let d;try{const raw=localStorage.getItem(KEY);d=raw?Object.assign(DEFAULT(),JSON.parse(raw)):DEFAULT();}catch(e){d=DEFAULT();}return migrate(d);}
function blocksToHtml(blocks){return (blocks||[]).map(b=>{const tx=esc(b.text||'');
  if(b.type==='h1')return `<h1>${tx}</h1>`;if(b.type==='h2')return `<h2>${tx}</h2>`;
  if(b.type==='quote')return `<blockquote>${tx}</blockquote>`;if(b.type==='bullet')return `<ul><li>${tx}</li></ul>`;
  if(b.type==='todo')return `<div class="todo-line"><input type="checkbox" ${b.checked?'checked':''}><span>${tx}</span></div>`;
  if(b.type==='divider')return `<hr>`;
  if(b.type==='page')return `<p><a class="subpage" data-act="open-subpage" data-id="${b.childId}" contenteditable="false">📄 ${esc((d_lookup(b.childId)||{}).title||'Page')}</a></p>`;
  if(b.type==='image'&&b.src)return `<p><img src="${b.src}"></p>`;
  return `<p>${tx}</p>`;}).join('');}
var _migNotes=null;function d_lookup(id){return (_migNotes||[]).find(n=>n.id===id);}
function migrate(d){
  if(!d.xp)d.xp={};if(!d.trackers)d.trackers=DEFAULT().trackers;if(!d.trackerLog)d.trackerLog={};
  if(!d.profile.quote)d.profile.quote=DEFAULT().profile.quote;
  if(!d.settings.particles)d.settings.particles=['flowers'];
  if(typeof d.settings.particles==='string')d.settings.particles=d.settings.particles==='off'?[]:[d.settings.particles];
  if(!d.settings.colors)d.settings.colors={};
  if(d.settings.gradient==null)d.settings.gradient='';
  if(!d.settings.customParticles)d.settings.customParticles=[];
  if(d.settings.editLabels==null)d.settings.editLabels=false;
  if(!d.settings.appName)d.settings.appName='The Blossom';
  if(!d.labels)d.labels={};
  if(!d.home)d.home={order:HOME_DEFAULT_ORDER.slice(),hidden:[],custom:[]};
  if(!d.home.custom)d.home.custom=[];if(!d.home.hidden)d.home.hidden=[];if(!d.home.order)d.home.order=HOME_DEFAULT_ORDER.slice();
  HOME_DEFAULT_ORDER.forEach(id=>{if(!d.home.order.includes(id))d.home.order.push(id);});
  if(!d.timers)d.timers=[];
  if(d.settings.dayStart==null)d.settings.dayStart=0;
  if(d.settings.dayEnd==null)d.settings.dayEnd=24;
  if(!d.aspects){d.aspects=JSON.parse(JSON.stringify(ASPECT_DEFAULTS));}
  // ensure builtin aspects exist & have skills
  for(const k in ASPECT_DEFAULTS){if(!d.aspects[k])d.aspects[k]=JSON.parse(JSON.stringify(ASPECT_DEFAULTS[k]));if(!d.aspects[k].skills)d.aspects[k].skills=ASPECT_DEFAULTS[k].skills.slice();}
  if(!d.aspectOrder)d.aspectOrder=Object.keys(d.aspects);
  Object.keys(d.aspects).forEach(k=>{if(!d.aspectOrder.includes(k))d.aspectOrder.push(k);});
  if(d.pulses&&d.pulses.length){d.pulses.forEach(p=>{d.trackerLog[p.date]={mood:p.mood,energy:p.energy,focus:p.focus};});delete d.pulses;}
  _migNotes=d.notes||[];
  (d.notes||[]).forEach(n=>{if(n.html==null){n.html=n.blocks?blocksToHtml(n.blocks):(n.body?('<p>'+esc(n.body)+'</p>'):'');}delete n.blocks;delete n.body;delete n.mode;if(!n.icon)n.icon=n.kind==='skill'?'🌱':'📄';if(!n.tags)n.tags=[];});
  (d.journal||[]).forEach(j=>{if(j.html==null){j.html=j.blocks?blocksToHtml(j.blocks):(j.body?('<p>'+esc(j.body)+'</p>'):'');}delete j.blocks;delete j.body;if(!j.title)j.title='';if(!j.tags)j.tags=[];});
  d.meta&&(d.meta.version=3);return d;
}
let saveTimer;function save(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,140);}
function saveNow(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('⚠ Storage full');}}

/* ===== 3. DOMAIN ===== */
function habitStreak(h){let s=0,d=new Date();if(!habitDone(h,todayStr()))d.setDate(d.getDate()-1);for(;;){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(habitDone(h,k)){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function longestStreak(h){const days=Object.keys(h.logs).filter(k=>habitDone(h,k)).sort();let best=0,cur=0,prev=null;for(const k of days){if(prev&&daysBetween(prev,k)===1)cur++;else cur=1;best=Math.max(best,cur);prev=k;}return best;}
function habitConsistency(h,days=14){let c=0,t=new Date();for(let i=0;i<days;i++){const dd=new Date(t.getTime()-i*864e5);const k=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');if(habitDone(h,k))c++;}return Math.round(c/days*100);}
function rubric(p){if(p>=90)return{g:'A',c:'var(--physical)'};if(p>=75)return{g:'B',c:'var(--gold)'};if(p>=60)return{g:'C',c:'var(--emotional)'};return{g:'Re-root',c:'var(--pink)'};}

const xpKey=(a,s)=>a+'::'+(s||'_');
function gainXP(a,s,amt){if(!a)return;const k=xpKey(a,s);S.xp[k]=Math.max(0,(S.xp[k]||0)+amt);if(amt>0)flyXP(amt);}
const skillXP=(a,s)=>S.xp[xpKey(a,s)]||0;
function aspectXP(a){let t=0;for(const k in S.xp)if(k.indexOf(a+'::')===0)t+=S.xp[k];return t;}
const itemAspects=x=>(x.aspects&&x.aspects.length?x.aspects:(x.aspect?[x.aspect]:[]));
function gainItemXP(it,amt){const pairs=(it.skillPairs&&it.skillPairs.length)?it.skillPairs:itemAspects(it).map(a=>a+'::');if(!pairs.length)return;const per=amt/pairs.length;pairs.forEach(p=>{const[a,s]=p.split('::');gainXP(a,s||null,Math.round(per));});}
/* XP weight from importance / difficulty / time (each 1..5, default 3) */
function xpWeight(it){const imp=it.importance||3,dif=it.difficulty||3,tim=it.effort||3;return Math.max(3,Math.round(6*(imp+dif+tim)/3));}
/* goal XP tracked so re-sliding progress can't farm XP */
function syncGoalXP(g){const target=Math.round((clamp(g.progress||0,0,100)/100)*xpWeight(g));const given=g.xpGiven||0;const delta=target-given;if(delta!==0){gainItemXP(g,delta);g.xpGiven=target;}}
const habitRepeat=h=>(h.cosmos&&h.cosmos.repeat)||1;
const habitDone=(h,d)=>(h.logs[d]||0)>=habitRepeat(h);
const totalXpForLevel=L=>50*L*(L-1);
function levelFromXp(xp){let L=1;while(totalXpForLevel(L+1)<=xp)L++;return L;}
function levelInfo(xp){const L=levelFromXp(xp),a=totalXpForLevel(L),b=totalXpForLevel(L+1);return{level:L,pct:Math.round((xp-a)/(b-a)*100),cur:xp-a,need:b-a};}
function flyXP(amt){const e=document.createElement('div');e.className='xpfly';e.textContent='+'+amt+' XP';e.style.left=(innerWidth/2-20)+'px';e.style.top=(innerHeight-160)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),1000);}

function aspectScore(key){const hs=S.habits.filter(h=>itemAspects(h).includes(key)),gs=S.goals.filter(g=>itemAspects(g).includes(key));let parts=[];
  if(hs.length)parts.push(hs.reduce((a,h)=>a+habitConsistency(h),0)/hs.length);
  if(gs.length)parts.push(gs.reduce((a,g)=>a+(g.progress||0),0)/gs.length);
  const r=lastTrackerAvg();if(r!=null)parts.push(r);
  if(!parts.length)return 0;return Math.round(parts.reduce((a,b)=>a+b,0)/parts.length);}
function lastTrackerAvg(){const dates=Object.keys(S.trackerLog).sort().slice(-7);if(!dates.length)return null;let sum=0,n=0;dates.forEach(dt=>{S.trackers.forEach(tr=>{const v=S.trackerLog[dt][tr.id];if(v!=null){sum+=v/tr.max*100;n++;}});});return n?sum/n:null;}
function todayCompletion(){const t=todayStr();const items=agendaFor(t);const total=items.length;if(!total)return 0;const done=items.filter(it=>it.done).length;return Math.round(done/total*100);}
function bestStreakAll(){return S.habits.reduce((m,h)=>Math.max(m,habitStreak(h)),0);}

/* unified agenda for a date: habits due, todos, goal tasks, events, milestones */
function agendaFor(ds){const wd=new Date(ds+'T00:00').getDay();const items=[];
  S.habits.forEach(h=>{const days=(h.cosmos&&h.cosmos.days)||[];if(days.length===0||days.includes(DOW[wd]))items.push({kind:'habit',id:h.id,date:ds,text:h.name,aspect:h.aspect,done:habitDone(h,ds),count:h.logs[ds]||0,rep:habitRepeat(h),streak:habitStreak(h)});});
  S.todos.forEach(td=>{const rec=td.days&&td.days.length;const show=rec?td.days.includes(DOW[wd]):td.date===ds;if(show){const done=rec?!!(td.doneDates&&td.doneDates[ds]):td.done;items.push({kind:'todo',id:td.id,text:td.text,aspect:td.aspect,done,recurring:rec});}});
  S.goals.forEach(g=>{const days=(g.cosmos&&g.cosmos.days)||[];if(days.includes(DOW[wd]))items.push({kind:'goaltask',id:g.id,text:'🎯 '+g.name,aspect:g.aspect,done:false});
    if(g.targetDate===ds)items.push({kind:'goaltarget',id:g.id,text:'🏁 Target: '+g.name,aspect:g.aspect,done:(g.progress||0)>=100});
    (g.cosmos&&g.cosmos.milestones||[]).forEach(m=>{if(m.date===ds)items.push({kind:'milestone',id:g.id,text:'⛳ '+m.text,aspect:g.aspect,done:false});});});
  S.events.filter(e=>e.date===ds).forEach(e=>items.push({kind:'event',id:e.id,text:(e.start?e.start+' ':'')+e.title,aspect:e.aspect,done:false}));
  return items;}
function dayAspectDots(ds){return [...new Set(agendaFor(ds).map(i=>i.aspect).filter(Boolean))].slice(0,4);}

/* notes */
const childNotes=pid=>S.notes.filter(n=>n.parentId===pid).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.updatedAt-a.updatedAt);
const getNote=id=>S.notes.find(n=>n.id===id);
function notePath(id){const p=[];let n=getNote(id);while(n){p.unshift(n);n=n.parentId?getNote(n.parentId):null;}return p;}
function addNote(parentId,title='',kind='page'){const n={id:uid(),parentId:parentId||null,title,icon:kind==='skill'?'🌱':'📄',kind,html:'',tags:[],pinned:false,createdAt:Date.now(),updatedAt:Date.now()};S.notes.push(n);save();return n;}
function deleteNoteTree(id){childNotes(id).forEach(k=>deleteNoteTree(k.id));S.notes=S.notes.filter(n=>n.id!==id);}
function ownerOf(t,id){return t==='journal'?S.journal.find(j=>j.id===id):getNote(id);}
const touch=o=>{if(o)o.updatedAt=Date.now();};
const htmlPreview=h=>{const d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').trim().slice(0,46);};

/* ===== 4. ROUTER ===== */
let nav=[{screen:'home'}];
const view=()=>nav[nav.length-1];
function go(v){flushEditor();nav.push(v);render();window.scrollTo(0,0);}
function back(){flushEditor();if(nav.length>1){nav.pop();render();window.scrollTo(0,0);}}
function setTab(s){flushEditor();nav=[{screen:s}];render();window.scrollTo(0,0);}
const TABS=[['calendar','📅','Calendar'],['home','🏠','Home'],['blossom','🌸','The Blossom']];
const TABMAP={home:'home',calendar:'calendar',day:'calendar',blossom:'blossom',aspect:'blossom',skill:'blossom',map:'blossom',habit:'home',goal:'home',cosmos:'home',notes:'home',note:'home',journal:'home',jentry:'home',records:'home',alarms:'home'};
function render(){const v=view();applyTheme();renderAppbar(v);renderTabbar(v);
  $('#screen').innerHTML=(SCREENS[v.screen]||SCREENS.home)(v);
  const fab=$('#fab');if(['home','calendar','blossom','notes','aspect','skill','map'].includes(v.screen)){fab.style.display='grid';fab.dataset.ctx=v.screen;}else fab.style.display='none';
  refreshChips();
  applyLabels();
  if($('.docedit')){try{document.execCommand('defaultParagraphSeparator',false,'p');}catch(_){}}
  if(v.screen==='note'){const n=getNote(v.id);if(n&&!n.title&&!(n.html||'').trim()){const ti=$('.page-title');if(ti){ti.focus();}}}}
function applyLabels(){document.querySelectorAll('#screen .section-h h3, #screen .empty').forEach(el=>{if(el.dataset.def===undefined)el.dataset.def=el.textContent;const ov=S.labels[el.dataset.def];if(ov!==undefined)el.textContent=ov;el.classList.toggle('lbl-edit',!!S.settings.editLabels);});}
const THEME_PRESETS={
  dark:{label:'🌑 Forest (dark)',theme:'dark',colors:{},gradient:''},
  light:{label:'☀️ Light',theme:'light',colors:{},gradient:''},
  space:{label:'🌌 Space',theme:'dark',colors:{bg:'#08081c','bg-2':'#0f0f2a',card:'#16163a','card-2':'#1e1e4d',line:'#2c2c5c',text:'#e9e9ff',muted:'#9a9ad6','green-soft':'#5b4bce',pink:'#b39dff',gold:'#ffd27a'},gradient:'radial-gradient(120% 80% at 18% 0%, #3a1f7a 0%, transparent 50%), radial-gradient(120% 80% at 85% 15%, #143a78 0%, transparent 55%), linear-gradient(180deg,#0a0a26 0%,#06061a 100%)'},
  ocean:{label:'🌊 Ocean',theme:'dark',colors:{bg:'#04161f','bg-2':'#06212e',card:'#0a2c3c','card-2':'#0e3a4e',line:'#185565',text:'#e3f6ff',muted:'#8fc1cf','green-soft':'#1c8aa8',pink:'#5fd3c4',gold:'#ffd684'},gradient:'radial-gradient(120% 85% at 50% 0%, #0c5573 0%, transparent 55%), linear-gradient(180deg,#062331 0%,#03141c 100%)'},
  flower:{label:'🌸 Flower',theme:'light',colors:{bg:'#fff5f7','bg-2':'#fde9ee',card:'#ffffff','card-2':'#fff0f4',line:'#f3d4de',text:'#3a2630',muted:'#9c7080','green-soft':'#5aa37a',pink:'#e98ca6',gold:'#d99a52'},gradient:'radial-gradient(120% 80% at 18% 0%, #ffd9e6 0%, transparent 55%), radial-gradient(120% 80% at 88% 8%, #e3f3d6 0%, transparent 55%), linear-gradient(180deg,#fff6f8,#fdeef1)'},
  sunset:{label:'🌇 Sunset',theme:'dark',colors:{bg:'#180c16','bg-2':'#26111e',card:'#311628','card-2':'#3d1d31',line:'#562a40',text:'#ffe9e0',muted:'#d39ba6','green-soft':'#c2553f',pink:'#ff9a76',gold:'#ffcf6b'},gradient:'radial-gradient(130% 75% at 50% -8%, #ff7e5f 0%, transparent 52%), linear-gradient(180deg,#3a1530 0%,#160a14 100%)'},
};
function applyPreset(name){const p=THEME_PRESETS[name];if(!p)return;S.settings.theme=p.theme;S.settings.colors=Object.assign({},p.colors);S.settings.gradient=p.gradient||'';S.settings.preset=name;applyTheme();save();}
function applyTheme(){const root=document.documentElement;root.setAttribute('data-theme',S.settings.theme);
  const std=['bg','bg-2','card','card-2','line','text','muted','green-soft','pink','gold'];
  std.forEach(v=>root.style.removeProperty('--'+v));
  const c=S.settings.colors||{};Object.keys(c).forEach(v=>{if(c[v])root.style.setProperty('--'+v,c[v]);});
  if(S.settings.gradient)root.style.setProperty('--app-gradient',S.settings.gradient);else root.style.removeProperty('--app-gradient');
  document.querySelector('meta[name=theme-color]').setAttribute('content',c['bg']||(S.settings.theme==='dark'?'#0E1A13':'#F7F1E8'));
  document.title=S.settings.appName||'The Blossom';}
function renderTabbar(v){const active=TABMAP[v.screen]||'home';$('#tabbar').innerHTML=TABS.map(([s,ic,l])=>`<button class="tab ${active===s?'active':''}" data-act="tab" data-screen="${s}"><span class="ic">${ic}</span>${l}</button>`).join('');}
function renderAppbar(v){
  let title={home:(S.settings.appName||'Home'),calendar:'Calendar',blossom:'The Blossom',notes:'Notes',settings:'Settings',journal:'Journal',trackers:'Trackers',records:'Daily Records',alarms:'Alarms & Timers'}[v.screen]||'';
  if(v.screen==='note'){const n=getNote(v.id);title=(n&&(n.icon+' '+(n.title||'Untitled')))||'Note';}
  if(v.screen==='jentry'){const j=ownerOf('journal',v.id);title='📖 '+((j&&j.title)||'Entry');}
  if(v.screen==='aspect'){const a=AS(v.aspect);title=a.emoji+' '+a.name;}
  if(v.screen==='skill')title=v.skill;
  if(v.screen==='day')title=fmtShort(v.date);
  if(v.screen==='habit'){const h=S.habits.find(x=>x.id===v.id);title=h?h.name:'Habit';}
  if(v.screen==='goal'){const g=S.goals.find(x=>x.id===v.id);title=g?g.name:'Goal';}
  if(v.screen==='map'){const m=getNote(v.id);title=m?((m.icon||'🗺')+' '+(m.title||'Map')):'Map';}
  if(v.screen==='cosmos')title='COSMOS Card';
  const showBack=nav.length>1;
  let right=`<button class="iconbtn" data-act="open-settings">⚙️</button>`;
  if(v.screen==='home')right=`<button class="iconbtn" data-act="all-notes">🔍</button>`+right;
  $('#appbar').innerHTML=`<div class="appbar">${showBack?`<button class="backbtn" data-act="back">‹ Back</button>`:''}<div class="title"><h2>${esc(title)}</h2></div>${right}</div>`;
}

function goalCardHTML(g){const p=clamp(g.progress||0,0,100);const dr=g.targetDate?daysBetween(todayStr(),g.targetDate):null;const term=g.term==='long'?'🌳':'🌱';return `<div class="goal-card" data-act="open-goal" data-id="${g.id}"><div style="display:flex;justify-content:space-between;align-items:center"><b>${term} ${esc(g.name)}</b><span class="tag-dot" style="background:${aspectHex(g.aspect)}"></span></div><div class="bar"><i style="width:${p}%;background:${aspectHex(g.aspect)}"></i></div><small class="muted">${p}% · ${g.skill||AS(g.aspect).name}${dr!=null?` · ${dr>=0?dr+' days left':'overdue'}`:''}</small></div>`;}
function alarmHTML(a){return `<div class="list-item"><button class="check round ${a.enabled?'on':''}" data-act="toggle-alarm" data-id="${a.id}">${a.enabled?'✓':''}</button><span class="li-text" data-act="edit-alarm" data-id="${a.id}"><b>${a.time}</b> &nbsp;${esc(a.label)}</span><button class="iconbtn" style="width:30px;height:30px;font-size:13px" data-act="del-alarm" data-id="${a.id}">✕</button></div>`;}

function docEditor(t,o){

function restoreSel(){const ed=$('.docedit');if(!ed)return;ed.focus();if(savedRange){const s=getSelection();s.removeAllRanges();s.addRange(savedRange);}}
function colorSheet(){const TC=['#EAF2EC','#F4A4B0','#D4AC60','#52B788','#5B8DEF','#B07CE8','#E07A5F'];const HC=['transparent','#5b3a42','#5a4a24','#234a32','#27406b','#43305e'];

function linkPageSheet(t,oid){const cur=t==='note'?oid:null;const pages=S.notes.filter(n=>n.kind!=='skill'&&n.kind!=='map'&&n.id!==cur).sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,40);

/* ---- CALENDAR (week default, swap month/day) ---- */
let calCursor=new Date();let calSel=todayStr();let calView='week';
function weekDays(ds){const d=new Date(ds+'T00:00');const start=new Date(d);start.setDate(d.getDate()-d.getDay());const out=[];for(let i=0;i<7;i++){const x=new Date(start);x.setDate(start.getDate()+i);out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}return out;}
function timelineHTML(date){const startH=S.settings.dayStart??0,endH=S.settings.dayEnd??24,hh=48;const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  const evs=S.events.filter(e=>e.date===date&&e.start).sort((a,b)=>a.start.localeCompare(b.start));
  const lanes=[];evs.forEach(e=>{const s=toMin(e.start);const en=e.end?toMin(e.end):s+60;e._s=s;e._e=Math.max(en,s+30);let li=lanes.findIndex(end=>end<=s);if(li<0){li=lanes.length;lanes.push(0);}lanes[li]=e._e;e._lane=li;});
  const nL=Math.max(1,lanes.length);
  let hrs='';for(let h=startH;h<endH;h++)hrs+=`<div class="tl-hour"><span>${(h%12||12)}${h<12?'a':'p'}</span></div>`;
  const track=evs.map(e=>{const top=(e._s-startH*60)/60*hh;const height=Math.max(24,(e._e-e._s)/60*hh-3);const w=100/nL;const left=e._lane*w;
    return `<div class="tl-event" data-act="edit-event" data-id="${e.id}" style="top:${top}px;height:${height}px;left:${left}%;width:calc(${w}% - 6px);right:auto;background:${aspectHex(e.aspect)}"><b>${esc(e.title)}</b>${height>34?`<br><small>${e.start}${e.end?'–'+e.end:''}</small>`:''}</div>`;}).join('');
  return `<div class="tl" style="height:${(endH-startH)*hh}px"><div style="position:absolute;inset:0">${hrs}</div><div class="tl-track">${track}</div></div>`;}
function weekGridHTML(week){const startH=S.settings.dayStart??0,endH=S.settings.dayEnd??24,hh=42,rows=endH-startH;const t=todayStr();const toMin=tm=>{const[h,m]=tm.split(':').map(Number);return h*60+m;};
  const head=`<div class="wgrid-head"><div></div>${week.map(ds=>{const dt=new Date(ds+'T00:00');return `<div class="wgh ${ds===t?'today':''} ${ds===calSel?'sel':''}" data-act="cal-sel" data-date="${ds}"><small>${['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()]}</small><b>${dt.getDate()}</b></div>`;}).join('')}</div>`;
  const allday=`<div class="wgrid-head"><div></div>${week.map(ds=>{const items=agendaFor(ds).filter(a=>a.kind!=='event'&&!(a.kind==='todo'&&(S.todos.find(td=>td.id===a.id)||{}).time));const dots=[...new Set(items.map(i=>i.aspect).filter(Boolean))].slice(0,3);return `<div class="wg-allday">${dots.map(a=>`<i style="background:${aspectHex(a)}"></i>`).join('')||(items.length?'<i style="background:var(--muted)"></i>':'')}</div>`;}).join('')}</div>`;
  let times='';for(let h=startH;h<endH;h++)times+=`<div class="wg-time" style="height:${hh}px"><span>${(h%12||12)}${h<12?'a':'p'}</span></div>`;
  const cols=week.map(ds=>{const evs=S.events.filter(e=>e.date===ds&&e.start);const tt=S.todos.filter(td=>td.date===ds&&td.time).map(td=>({id:td.id,title:td.text,start:td.time,end:'',aspect:td.aspect,todo:1}));
    let lines='';for(let h=startH;h<endH;h++)lines+=`<div style="position:absolute;left:0;right:0;top:${(h-startH)*hh}px;border-top:1px solid var(--line)"></div>`;
    const blocks=[...evs,...tt].map(e=>{const s=toMin(e.start);const en=e.end?toMin(e.end):s+45;const top=(s-startH*60)/60*hh;const height=Math.max(13,(en-s)/60*hh-2);return `<div class="wg-ev" data-act="${e.todo?'edit-todo':'edit-event'}" data-id="${e.id}" style="top:${top}px;height:${height}px;background:${aspectHex(e.aspect)||'var(--muted-2)'}">${esc(e.title)}</div>`;}).join('');
    return `<div class="wg-day" style="height:${rows*hh}px">${lines}${blocks}</div>`;}).join('');
  return `${head}${allday}<div class="gwrap"><div class="wgrid" style="min-width:${30+7*46}px"><div class="wg-times">${times}</div><div class="wg-days">${cols}</div></div></div>`;}
SCREENS.calendar=function(){
  const t=todayStr();
  const toggle=`<div class="calview">${[['week','Week'],['month','Month'],['day','Day']].map(([v,l])=>`<button class="${calView===v?'on':''}" data-act="cal-view" data-view="${v}">${l}</button>`).join('')}</div>`;
  let head='';
  if(calView==='month'){const y=calCursor.getFullYear(),m=calCursor.getMonth();const startDow=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const cells=[];
    for(let i=0;i<startDow;i++)cells.push({d:new Date(y,m,0-(startDow-1-i)),other:true});for(let i=1;i<=dim;i++)cells.push({d:new Date(y,m,i),other:false});while(cells.length%7)cells.push({d:new Date(y,m+1,cells.length-startDow-dim+1),other:true});
    head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${calCursor.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h3><button class="iconbtn" data-act="cal-next">›</button></div>
      <div class="cal-grid">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells.map(c=>{const ds=c.d.getFullYear()+'-'+String(c.d.getMonth()+1).padStart(2,'0')+'-'+String(c.d.getDate()).padStart(2,'0');const dots=dayAspectDots(ds);return `<button class="cal-cell ${c.other?'other':''} ${ds===t?'today':''} ${ds===calSel?'sel':''}" data-act="cal-sel" data-date="${ds}">${c.d.getDate()}<div class="cal-dots">${dots.map(a=>`<i style="background:${aspectHex(a)}"></i>`).join('')}</div></button>`;}).join('')}</div>`;
  }else if(calView==='week'){const wk=weekDays(calSel);const lbl=fmtShort(wk[0])+' – '+fmtShort(wk[6]);
    head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${lbl}</h3><button class="iconbtn" data-act="cal-next">›</button></div>${weekGridHTML(wk)}`;
  }else{const dt=new Date(calSel+'T00:00');head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</h3><button class="iconbtn" data-act="cal-next">›</button></div>`;}
  const nonTimed=agendaFor(calSel).filter(a=>a.kind!=='event');
  return `<div class="content">
    <div class="card">${toggle}${head}</div>
    <div class="section-h"><h3>${esc(fmtDate(calSel))}</h3><div><button class="add" data-act="new-todo" data-date="${calSel}">+ Task</button> &nbsp;<button class="add" data-act="new-event" data-date="${calSel}">+ Event</button></div></div>
    ${nonTimed.length?`<div class="card tight">${nonTimed.map(a=>agendaHTML(a,calSel)).join('')}</div>`:''}
    ${calView==='day'?`<div class="card"><h3>🕒 Timeline</h3>${timelineHTML(calSel)}</div>`:''}
    <button class="btn block" data-act="apply-routine-to" data-date="${calSel}">🔁 Apply routine</button>
    <div class="section-h"><h3>🔁 Routine Templates</h3><button class="add" data-act="new-routine">+ Routine</button></div>
    <div class="card tight">${S.routines.length?S.routines.map(routineHTML).join(''):'<div class="empty">Build a routine</div>'}</div>
  </div>`;};
function routineHTML(r){return `<div class="list-item"><span class="li-text" data-act="edit-routine" data-id="${r.id}"><b>${esc(r.name)}</b> <small class="muted">· ${r.blocks.length} items</small></span><button class="btn sm" data-act="apply-routine" data-id="${r.id}">Apply…</button><button class="iconbtn" style="width:30px;height:30px;font-size:13px" data-act="del-routine" data-id="${r.id}">✕</button></div>`;}
SCREENS.day=function(v){const date=v.date;calSel=date;calView='day';return SCREENS.calendar();};
function calNav(dir){if(calView==='month'){calCursor.setMonth(calCursor.getMonth()+dir);}else if(calView==='week'){calSel=dateAdd(calSel,dir*7);calCursor=new Date(calSel+'T00:00');}else{calSel=dateAdd(calSel,dir);calCursor=new Date(calSel+'T00:00');}}

/* ---- BLOSSOM ---- */
SCREENS.blossom=function(){
  const keys=aspectKeys();const levels=keys.map(k=>levelFromXp(aspectXP(k)));
  return `<div class="content">
    <div class="card"><div class="flower-wrap">${flowerSVG(keys,levels)}</div>
      <p class="muted small" style="text-align:center;margin:0 0 8px">Tap a petal to explore that part of you. Each petal grows as you level its skills.</p>
      <button class="btn sm block" data-act="add-aspect">＋ Add an aspect (new petal)</button></div>
    <div class="aspect-grid">${keys.map((k,i)=>{const a=AS(k);const li=levelInfo(aspectXP(k));return `<div class="aspect-tile" data-act="open-aspect" data-aspect="${k}" style="background:linear-gradient(160deg,${a.hex}22,var(--card))"><span class="em">${a.emoji}</span><span class="lv" style="color:${a.hex}">Lv ${li.level}</span><span class="nm">${esc(a.name)}</span><div class="bar thin" style="margin-top:3px"><i style="width:${li.pct}%;background:${a.hex}"></i></div><small class="muted">Health ${aspectScore(k)} · ${li.cur}/${li.need} XP</small></div>`;}).join('')}
      <button class="aspect-add" data-act="add-aspect">＋ Add aspect</button></div>
    <button class="btn block" data-act="open-journal">📖 Journal & Reflections</button>
    <div class="card"><h3>📈 Tracker Graph</h3>${trackerGraphAll()}</div>
  </div>`;};
SCREENS.aspect=function(v){const k=v.aspect,a=AS(k);if(k==='physical')seedBodyMap();const maps=mapsForAspect(k);const li=levelInfo(aspectXP(k));const habits=S.habits.filter(h=>itemAspects(h).includes(k)),goals=S.goals.filter(g=>itemAspects(g).includes(k));
  return `<div class="content">
    <div class="card" style="background:linear-gradient(160deg,${a.hex}26,var(--card))">
      <div style="display:flex;align-items:center;gap:14px"><div style="font-size:40px">${a.emoji}</div>
        <div style="flex:1"><b style="font-size:19px">${esc(a.name)}</b> <span class="level-badge" style="color:${a.hex}">Lv ${li.level}</span>
          <div class="bar thin" style="margin:6px 0 4px"><i style="width:${li.pct}%;background:${a.hex}"></i></div>
          <small class="muted">${li.cur}/${li.need} XP to Lv ${li.level+1} · Health ${aspectScore(k)}/100</small></div>
        <button class="iconbtn" data-act="edit-aspect" data-aspect="${k}">⋯</button></div></div>
    <div class="section-h"><h3>🗂 Groups</h3><button class="add" data-act="add-map" data-aspect="${k}">+ Group</button></div>
    <div class="card tight">${maps.length?maps.map(mapTileHTML).join(''):'<div class="empty">Add a group — a collection of pages (e.g. Body → Chest, Back; or Subjects, Routes…).</div>'}</div>
    <div class="section-h"><h3>Skills</h3><button class="add" data-act="add-skill" data-aspect="${k}">+ Skill</button></div>
    <div class="card tight">${a.skills.length?a.skills.map(sk=>{const sl=levelInfo(skillXP(k,sk));return `<div class="skill-row" data-act="open-skill" data-aspect="${k}" data-skill="${esc(sk)}"><div class="skill-ic">${skillIcon(sk)}</div><div style="flex:1"><div style="display:flex;justify-content:space-between"><b>${esc(sk)}</b><span class="muted small">Lv ${sl.level}</span></div><div class="bar thin" style="margin-top:5px"><i style="width:${sl.pct}%;background:${a.hex}"></i></div></div><span class="chev">›</span></div>`;}).join(''):'<div class="empty">No skills yet — add one to start leveling this aspect.</div>'}</div>
    <div class="section-h"><h3>🎯 Goals</h3><button class="add" data-act="new-cosmos" data-kind="goal" data-aspect="${k}">+ Goal</button></div>
    ${goals.length?(()=>{const longG=goals.filter(g=>g.term==='long'),shortG=goals.filter(g=>g.term!=='long');
      return (longG.length?`<div class="muted small" style="margin:4px 2px">🌳 Long-term</div>`+longG.map(goalWithHabits).join(''):'')+(shortG.length?`<div class="muted small" style="margin:10px 2px 4px">🌱 Short-term</div>`+shortG.map(goalWithHabits).join(''):'');})():'<div class="card"><div class="empty">Create a goal</div></div>'}
    ${(()=>{const free=habits.filter(h=>!h.goalId||!goals.find(g=>g.id===h.goalId));return `<div class="section-h"><h3>🔥 Habits${free.length<habits.length?' (not in a goal)':''}</h3><button class="add" data-act="new-cosmos" data-kind="habit" data-aspect="${k}">+ Habit</button></div>${free.length?`<div class="hstrip">${free.map(habitCardHTML).join('')}</div>`:'<div class="card"><div class="empty">Create a habit</div></div>'}`;})()}
  </div>`;};
function habitRowHTML(h){const done=habitDone(h,todayStr());return `<div class="agenda-item"><div class="ai-bar" style="background:${aspectHex(h.aspect)}"></div><button class="check round ${done?'on':''}" data-act="checkin" data-id="${h.id}" data-date="${todayStr()}">${done?'✓':''}</button><div class="ai-b" data-act="open-habit" data-id="${h.id}"><b>${esc(h.name)}</b><small> · ${habitStreak(h)}🔥</small></div></div>`;}
function goalWithHabits(g){const hs=S.habits.filter(h=>h.goalId===g.id);return `<div style="margin-bottom:12px">${goalCardHTML(g)}<div style="margin:2px 0 0 12px">${hs.map(habitRowHTML).join('')}<button class="btn sm block" style="margin-top:4px" data-act="new-cosmos" data-kind="habit" data-goalid="${g.id}" data-aspect="${g.aspect}">＋ Habit for this goal</button></div></div>`;}
function skillIcon(s){const m={'Strength':'🏋️','Endurance':'🏃','Flexibility & Mobility':'🧘','Nutrition':'🥗','Rest & Recovery':'😴','Skill Development':'🎯','Focus & Discipline':'⏳','Critical Thinking':'🧩','Learning & Knowledge':'📚','Time Management':'🗓️','Identity & Self-Development':'🪞','Communication':'💬','Values':'⚖️','Connection':'🫂','Collaboration':'👥','Presence & Reputation':'✨','Self-Awareness':'🔍','Resilience':'🛡️','Mindfulness':'🌬️','Emotional Intelligence':'💗','Purpose & Gratitude':'🙏'};return m[s]||'🌱';}
function skillRootNote(k,sk,create=true){let n=S.notes.find(x=>x.kind==='skill'&&x.skillKey===k+'::'+sk);if(!n&&create){n=addNote(null,sk,'skill');n.skillKey=k+'::'+sk;n.tags=[k];save();}return n;}
SCREENS.skill=function(v){const k=v.aspect,sk=v.skill,a=AS(k);const root=skillRootNote(k,sk);const kids=childNotes(root.id);const goals=S.goals.filter(g=>itemAspects(g).includes(k)&&(g.skills||[g.skill]).includes(sk));const sl=levelInfo(skillXP(k,sk));
  return `<div class="content"><div class="card" style="background:linear-gradient(160deg,${a.hex}22,var(--card))"><h3>${skillIcon(sk)} ${esc(sk)} <span class="level-badge" style="color:${a.hex};margin-left:auto">Lv ${sl.level}</span></h3><div class="bar thin" style="margin:8px 0 4px"><i style="width:${sl.pct}%;background:${a.hex}"></i></div><small class="muted">${sl.cur}/${sl.need} XP</small></div>
    <div class="row"><button class="btn pink" data-act="new-skill-entry" data-skill-root="${root.id}">+ New entry / log</button><button class="btn gold" data-act="new-cosmos" data-kind="goal" data-aspect="${k}" data-skill="${esc(sk)}">+ Goal</button></div>
    ${goals.length?`<div class="section-h"><h3>Goals</h3></div>${goals.map(goalCardHTML).join('')}`:''}
    <div class="section-h"><h3>Entries & Notes</h3></div>
    <div class="card tight">${kids.length?kids.map(noteTileHTML).join(''):'<div class="empty">No entries yet. Each entry is a full page you can nest deeper.</div>'}</div></div>`;};

/* ---- MAPS & GROUPS (pages per group, any aspect) ---- */
const mapsForAspect=k=>S.notes.filter(n=>n.kind==='map'&&n.mapAspect===k).sort((a,b)=>a.createdAt-b.createdAt);
function addMap(aspect,title,icon){const n=addNote(null,title,'map');n.mapAspect=aspect;n.icon=icon||'🗺';save();return n;}
function seedBodyMap(){if(mapsForAspect('physical').length)return;const m=addMap('physical','Body','🧍');
  ['🫁 Chest','🔺 Back','💪 Shoulders','💪 Arms','🧱 Core','🦵 Legs','🍑 Glutes','🏃 Cardio'].forEach(g=>{const c=addNote(m.id,g.slice(g.indexOf(' ')+1));c.icon=g.slice(0,2);});save();}
function mapTileHTML(m){return `<div class="maptile" data-act="open-map" data-id="${m.id}"><span class="mt-ic">${m.icon||'🗺'}</span><div style="flex:1"><b>${esc(m.title||'Map')}</b><br><small class="muted">${childNotes(m.id).length} pages</small></div><span class="chev">›</span></div>`;}
SCREENS.map=function(v){const m=getNote(v.id);if(!m)return '<div class="content"><div class="empty">Map not found.</div></div>';const kids=childNotes(m.id);
  return `<div class="content">
    <div class="card"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:26px">${m.icon||'🗂'}</span><div style="flex:1"><b style="font-size:18px">${esc(m.title)}</b><br><small class="muted">${AS(m.mapAspect).emoji} ${AS(m.mapAspect).name} · ${kids.length} pages</small></div><button class="iconbtn" data-act="map-menu" data-id="${m.id}">⋯</button></div></div>
    <div class="section-h"><h3>Pages</h3><button class="add" data-act="add-map-page" data-id="${m.id}">+ Add page</button></div>
    <div class="card tight">${kids.length?kids.map(noteTileHTML).join(''):'<div class="empty">Add a group/page (e.g. Chest, Biceps). Each opens a detailed notes page you can nest deeper.</div>'}</div>
  </div>`;};

/* ---- HABIT / GOAL ---- */
SCREENS.habit=function(v){const h=S.habits.find(x=>x.id===v.id);if(!h)return '<div class="content"><div class="empty">Not found</div></div>';const cons=habitConsistency(h),r=rubric(cons),c=h.cosmos||{};
  return `<div class="content"><div class="card" style="background:linear-gradient(160deg,${aspectHex(h.aspect)}22,var(--card))"><h3>${esc(h.name)}</h3>
    <div class="kpi" style="margin-top:8px"><div class="k"><b>${habitStreak(h)}🔥</b><small>Current</small></div><div class="k"><b>${longestStreak(h)}</b><small>Longest</small></div><div class="k"><b>${cons}%</b><small>14-day</small></div><div class="k"><b style="color:${r.c}">${r.g}</b><small>Grade</small></div></div>
    <button class="checkin ${habitDone(h,todayStr())?'done':''}" data-act="checkin" data-id="${h.id}" data-date="${todayStr()}" style="margin-top:12px">${habitDone(h,todayStr())?'✓ Done today':(habitRepeat(h)>1?`Check in (${h.logs[todayStr()]||0}/${habitRepeat(h)})`:'Check in today')}</button></div>
    ${cosmosSummaryCard(c)}<div class="card"><h3>Last 28 days</h3>${habitHeatmap(h)}</div>
    <div class="row"><button class="btn sm" data-act="edit-cosmos" data-kind="habit" data-id="${h.id}">✎ Edit COSMOS</button><button class="btn sm" data-act="del-habit" data-id="${h.id}">🗑 Delete</button></div></div>`;};
SCREENS.goal=function(v){const g=S.goals.find(x=>x.id===v.id);if(!g)return '<div class="content"><div class="empty">Not found</div></div>';const c=g.cosmos||{},p=clamp(g.progress||0,0,100);const term=g.term==='long'?'🌳 Long-term':'🌱 Short-term';const dr=g.targetDate?daysBetween(todayStr(),g.targetDate):null;const hs=S.habits.filter(h=>h.goalId===g.id);
  return `<div class="content"><div class="card" style="background:linear-gradient(160deg,${aspectHex(g.aspect)}22,var(--card))">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="level-badge">${term}</span><span class="pill">${AS(g.aspect).emoji} ${esc(AS(g.aspect).name)}</span>${g.skill?`<span class="pill">${esc(g.skill)}</span>`:''}</div>
    <h3 style="margin:10px 0 2px;font-size:20px">${esc(g.name)}</h3>
    ${g.why?`<p class="muted small serif" style="margin:2px 0 0">“${esc(g.why)}”</p>`:''}
    <div class="bar" style="margin:14px 0 6px"><i style="width:${p}%;background:${aspectHex(g.aspect)}"></i></div>
    <div class="slider-row"><label>Progress</label><input type="range" min="0" max="100" value="${p}" data-act="goal-progress" data-id="${g.id}"><output>${p}%</output></div>
    <small class="muted">${g.targetDate?`🎯 Target ${esc(fmtShort(g.targetDate))}${dr!=null?` · ${dr>=0?dr+' days left':'overdue'}`:''}`:'No target date'}</small></div>
    <div class="section-h"><h3>🔥 Habits toward this goal</h3><button class="add" data-act="new-cosmos" data-kind="habit" data-goalid="${g.id}" data-aspect="${g.aspect}">+ Habit</button></div>
    <div class="card tight">${hs.length?hs.map(habitRowHTML).join(''):'<div class="empty">Add a daily habit that moves this goal forward.</div>'}</div>
    ${cosmosSummaryCard(c)}${(c.milestones&&c.milestones.length)?`<div class="card"><h3>Milestones</h3>${c.milestones.map(m=>`<div class="logline"><span>${esc(m.text)}</span><b>${esc(m.date||'')}</b></div>`).join('')}</div>`:''}
    <div class="row"><button class="btn sm" data-act="edit-cosmos" data-kind="goal" data-id="${g.id}">✎ Edit goal</button><button class="btn sm" data-act="del-goal" data-id="${g.id}">🗑 Delete</button></div></div>`;};
function cosmosSummaryCard(c){if(!c||!Object.keys(c).length)return '';const row=(l,val)=>val?`<div class="logline"><span class="muted">${l}</span><b style="text-align:right;max-width:60%">${esc(val)}</b></div>`:'';const trig=c.anchor?`After I ${c.anchor}${c.place?', at '+c.place:''}${c.time?' around '+c.time:''}, I will ${c.tinyAction||c.standard||'…'}.`:'';return `<div class="card"><h3>🌌 COSMOS Card</h3>${row('Purpose',c.purpose)}${row('Goal',c.goal)}${row('Metric',c.metric)}${row('When',[c.days&&c.days.length?c.days.join(' '):'',c.time].filter(Boolean).join(' · '))}${row('Trigger',trig)}${row('MVV',c.mvv)}${row('Standard',c.standard)}${row('Stretch',c.stretch)}${row('Reward',[c.reward1,c.reward2].filter(Boolean).join(' · '))}${row('If miss',c.backup)}${row('Review',c.review)}</div>`;}

/* ---- JOURNAL ---- */
let journalCursor=todayStr();
SCREENS.journal=function(){const entries=S.journal.filter(j=>j.date===journalCursor).sort((a,b)=>b.createdAt-a.createdAt);const d=new Date(journalCursor+'T00:00');
  return `<div class="content"><div class="card"><div class="daynav"><button class="iconbtn" data-act="jrnl-prev">‹</button><div class="d"><b>${d.toLocaleDateString(undefined,{weekday:'long'})}</b><small>${esc(fmtDate(journalCursor))}</small></div><button class="iconbtn" data-act="jrnl-next">›</button></div><div class="row" style="margin-top:10px"><input class="input" type="date" value="${journalCursor}" data-act="jrnl-jump"><button class="btn sm" data-act="jrnl-today">Today</button></div></div>
    <button class="btn pink block" data-act="new-journal">✍️ New entry for this day</button>
    <div class="card tight">${entries.length?entries.map(j=>`<div class="note-tile" data-act="open-jentry" data-id="${j.id}"><span class="nt-ic">📖</span><div class="nt-body"><b>${esc(j.title||'Entry')} ${j.aspect?AS(j.aspect).emoji:''}</b><small>${esc(htmlPreview(j.html))||'empty'}</small></div></div>`).join(''):'<div class="empty">No entries on this day. Use ‹ › to browse other days.</div>'}</div></div>`;};
SCREENS.jentry=function(v){const j=ownerOf('journal',v.id);if(!j)return '<div class="content"><div class="empty">Entry not found.</div></div>';
  return `<div class="content"><div class="crumbs"><a data-act="open-journal">Journal</a><span class="sep">›</span><span>${esc(fmtShort(j.date))}</span></div>
    <input class="page-title" value="${esc(j.title)}" placeholder="Entry title (optional)" data-act="jentry-title" data-id="${j.id}" style="margin-bottom:6px"/>
    <div class="chips" style="margin:0 0 0">${aspectKeys().map(k=>`<button class="chip ${j.aspect===k?'on':''}" data-act="jentry-aspect" data-id="${j.id}" data-tag="${k}">${AS(k).emoji}</button>`).join('')}</div>
    ${docEditor('journal',j)}<button class="btn sm" style="margin-top:10px" data-act="del-jentry" data-id="${j.id}">🗑 Delete entry</button></div>`;};

/* ---- RECORDS (daily history) ---- */
let recCursor=todayStr();
SCREENS.records=function(){const ds=recCursor;const d=new Date(ds+'T00:00');
  const trk=S.trackerLog[ds]||{};
  const habitsDone=S.habits.filter(h=>habitDone(h,ds));
  const todosDone=S.todos.filter(td=>td.date===ds&&td.done);
  const todosOpen=S.todos.filter(td=>td.date===ds&&!td.done);
  const events=S.events.filter(e=>e.date===ds);
  const jentries=S.journal.filter(j=>j.date===ds);
  const notesToday=S.notes.filter(n=>n.kind!=='skill'&&n.kind!=='map'&&sameDay(n.createdAt,ds));
  const block=(title,inner)=>`<div class="section-h"><h3>${title}</h3></div><div class="card tight">${inner}</div>`;
  return `<div class="content">
    <div class="card"><div class="daynav"><button class="iconbtn" data-act="rec-prev">‹</button><div class="d"><b>${d.toLocaleDateString(undefined,{weekday:'long'})}</b><small>${esc(fmtDate(ds))}</small></div><button class="iconbtn" data-act="rec-next">›</button></div><div class="row" style="margin-top:10px"><input class="input" type="date" value="${ds}" data-act="rec-jump"><button class="btn sm" data-act="rec-today">Today</button></div></div>
    ${block('📈 Trackers logged', S.trackers.some(tr=>trk[tr.id]!=null)?S.trackers.filter(tr=>trk[tr.id]!=null).map(tr=>`<div class="logline"><span>${tr.emoji} ${esc(tr.name)}</span><b>${trk[tr.id]}/${tr.max}</b></div>`).join(''):'<div class="empty">No tracker readings this day.</div>')}

let audioCtx=null,beepTimer=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
function startAlarmSound(){ensureAudio();stopAlarmSound();if(!audioCtx)return;let on=false;const beep=()=>{on=!on;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=on?880:660;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(0.3,t+0.02);g.gain.linearRampToValueAtTime(0.0001,t+0.34);o.start(t);o.stop(t+0.36);};beep();beepTimer=setInterval(beep,460);}
function stopAlarmSound(){if(beepTimer){clearInterval(beepTimer);beepTimer=null;}}

function flowerSVG(keys,levels){const cx=150,cy=150;const N=keys.length;const step=360/N;
  // wide, rounded petal; width shrinks as more petals are added so they tessellate into a full flower
  const wf=Math.max(0.46,Math.min(1.35,5.0/N));
  const petalPath='M0,0 C -52,-30 -58,-104 0,-138 C 58,-104 52,-30 0,0 Z';
  let main='',labels='';
  keys.forEach((k,i)=>{const ang=-90+(i+0.5)*step;const lv=levels[i];const ls=0.72+Math.min(lv,12)/12*0.36;const op=0.66+Math.min(lv,12)/12*0.3;const col=AS(k).hex;
    main+=`<g class="petal" data-act="open-aspect" data-aspect="${k}" transform="translate(${cx},${cy}) rotate(${ang}) scale(${wf},${ls})"><path d="${petalPath}" fill="${col}" opacity="${op}"/><path d="${petalPath}" fill="none" stroke="${col}" stroke-width="1.8" opacity="0.95"/><path d="M0,-16 C -14,-46 -10,-92 0,-118" fill="none" stroke="#fff" stroke-opacity="0.2" stroke-width="2"/></g>`;
    const r=128*ls;const a2=(ang)*Math.PI/180;const x=cx+Math.cos(a2-Math.PI/2)*r*0.86, y=cy+Math.sin(a2-Math.PI/2)*r*0.86;
    labels+=`<text x="${x}" y="${y+5}" text-anchor="middle" fill="${col}" font-size="14" font-weight="800" pointer-events="none" style="paint-order:stroke" stroke="var(--bg)" stroke-width="3">${lv}</text>`;});
  return `<svg width="300" height="300" viewBox="0 0 300 300" style="max-width:100%"><circle cx="150" cy="150" r="124" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 6"/>${main}<circle cx="150" cy="150" r="26" fill="var(--gold)"/><circle cx="150" cy="150" r="26" fill="none" stroke="#fff" stroke-opacity=".35" stroke-width="1.5"/><text x="150" y="158" text-anchor="middle" font-size="24" pointer-events="none">🌸</text>${labels}</svg>`;}
function trackerGraphAll(){const allDates=Object.keys(S.trackerLog).sort();if(!allDates.length)return '<div class="empty">Save a tracker reading on Home to start your graph.</div>';
  const stepX=42;const W=Math.max(320,26+8+(allDates.length-1)*stepX);const H=170,padL=26,padR=8,padT=10,padB=22;const innerW=W-padL-padR,innerH=H-padT-padB;
  const xOf=allDates.length===1?()=>padL+innerW/2:i=>padL+i*innerW/(allDates.length-1);const yOf=p=>padT+(1-p)*innerH;
  let grid='';[0,.25,.5,.75,1].forEach(p=>{const y=yOf(p);grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${padL-4}" y="${y+3}" text-anchor="end" class="graph-axis">${p*100|0}%</text>`;});

/* portable Blossom code (compressed, version-proof via migrate) */
function bytesToB64(bytes){let bin='';const ch=0x8000;for(let i=0;i<bytes.length;i+=ch)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));return btoa(bin);}
function b64ToBytes(b64){const bin=atob(b64.replace(/\s/g,''));const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function makeCode(){const json=JSON.stringify(S);try{if('CompressionStream'in window){const cs=new CompressionStream('gzip');const buf=await new Response(new Blob([json]).stream().pipeThrough(cs)).arrayBuffer();return 'BLZ1:'+bytesToB64(new Uint8Array(buf));}}catch(e){}return 'B64:'+bytesToB64(new TextEncoder().encode(json));}
async function readCode(code){code=(code||'').trim();
  if(code.startsWith('BLZ1:')){const ds=new DecompressionStream('gzip');const txt=await new Response(new Blob([b64ToBytes(code.slice(5))]).stream().pipeThrough(ds)).text();return JSON.parse(txt);}
  if(code.startsWith('B64:'))return JSON.parse(new TextDecoder().decode(b64ToBytes(code.slice(4))));
  return JSON.parse(code);}
async function copyCode(){let code;try{code=await makeCode();}catch(e){toast('⚠ Could not build code');return;}
  try{await navigator.clipboard.writeText(code);toast('📋 Code copied — paste it anywhere');}
  catch(e){sheet(`<h2>📋 Your Blossom code</h2><p class="muted small">Select all & copy this, keep it safe, paste on any device/version.</p><textarea class="input" style="min-height:170px" onclick="this.select()">${esc(code)}</textarea><button class="btn primary block" style="margin-top:10px" data-act="cancel-sheet">Done</button>`);}}
