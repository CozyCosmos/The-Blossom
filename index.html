/* input */
document.addEventListener('input',e=>{
  if(e.target.matches('[data-tslide]')){e.target.nextElementSibling.textContent=e.target.value+'/'+e.target.max;return;}
  if(e.target.matches('[data-themevar]')){S.settings.colors[e.target.dataset.themevar]=e.target.value;applyTheme();save();return;}
  const el=e.target.closest('[data-act]');if(!el)return;const a=el.dataset.act,id=el.dataset.id;
  if(a==='doc-edit'){const o=ownerOf(el.dataset.owner,el.dataset.oid);if(o){o.html=el.innerHTML;touch(o);save();}}
  if(a==='note-title'){const n=getNote(id);n.title=el.value;touch(n);save();const t=$('#appbar .title h2');if(t)t.textContent=(n.icon+' '+(n.title||'Untitled'));}
  if(a==='jentry-title'){const j=ownerOf('journal',id);j.title=el.value;touch(j);save();}
  if(a==='goal-progress'){const g=S.goals.find(x=>x.id===id);const nv=parseInt(el.value);g.progress=nv;syncGoalXP(g);el.nextElementSibling.textContent=nv+'%';save();}
  if(a==='note-search')noteSearch(el.value);
  if(a==='jrnl-jump'){journalCursor=el.value;render();}
  if(a==='rec-jump'){recCursor=el.value;render();}
});
/* change (checkboxes in doc) */
document.addEventListener('change',e=>{if(e.target.matches('.docedit input[type=checkbox]')){if(e.target.checked)e.target.setAttribute('checked','checked');else e.target.removeAttribute('checked');flushEditor();}
  if(e.target.matches('[data-clockopt-en]')){const w=$('#modal-root').querySelector(`[data-clockopt-wrap="${e.target.dataset.clockoptEn}"]`);if(w)w.style.display=e.target.checked?'':'none';}});
/* Enter inside notes: keep new lines working everywhere, incl. inside toggles */
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter'||e.shiftKey)return;
  const ed=e.target.closest&&e.target.closest('.docedit');if(!ed)return;
  const s=getSelection();if(!s.rangeCount)return;const n=s.anchorNode;const eln=n?(n.nodeType===1?n:n.parentElement):null;if(!eln)return;
  const title=eln.closest('.ntg-title');
  if(title){e.preventDefault();const tg=title.closest('.ntoggle');tg.classList.remove('folded');const body=tg.querySelector('.ntg-body');const p=document.createElement('p');p.appendChild(document.createElement('br'));body.appendChild(p);const r=document.createRange();r.selectNodeContents(p);r.collapse(true);s.removeAllRanges();s.addRange(r);flushEditor();return;}
  if(eln.closest('.ntoggle')){e.preventDefault();document.execCommand('insertParagraph');flushEditor();}
});
/* in-place pickers (no sheet rebuild) */
document.addEventListener('click',e=>{
  const ap=e.target.closest('[data-asp-pick]');if(ap){ap.classList.toggle('on');const field=ap.closest('.aspskill');const aspects=[...field.querySelectorAll('.asp-row .chip.on')].map(c=>c.dataset.aspPick);const pairs=[...field.querySelectorAll('.asp-skills .chip.on')].map(c=>c.dataset.skillPick).filter(p=>aspects.includes(p.split('::')[0]));field.querySelector('.asp-skills').innerHTML=aspSkillsInner(aspects,pairs);if(wiz){wiz.data.aspects=aspects;wiz.data.skillPairs=pairs;}return;}
  const sp2=e.target.closest('[data-skill-pick]');if(sp2){sp2.classList.toggle('on');if(wiz){const field=sp2.closest('.aspskill');wiz.data.skillPairs=[...field.querySelectorAll('.asp-skills .chip.on')].map(c=>c.dataset.skillPick);}return;}
  const ad=e.target.closest('[data-wday]');if(ad){ad.classList.toggle('on');if(wiz)wiz.data.days=[...$('#modal-root').querySelectorAll('[data-wday].on')].map(x=>x.dataset.wday);return;}
  const fc=e.target.closest('[data-fchip]');if(fc){const wrap=fc.closest('[data-fchips]');wrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));fc.classList.add('on');return;}
  const fd=e.target.closest('[data-fday]');if(fd){fd.classList.toggle('on');return;}
});
function noteSearch(q){const box=$('#noteSearchResults');if(!box)return;q=q.trim().toLowerCase();if(!q){box.innerHTML='';return;}const hits=S.notes.filter(n=>n.kind!=='skill'&&n.kind!=='map'&&((n.title||'')+' '+htmlPreview(n.html)).toLowerCase().includes(q)).slice(0,12);box.innerHTML=hits.length?('<div style="margin-top:10px">'+hits.map(noteTileHTML).join('')+'</div>'):'<div class="empty">No matches</div>';}

function eventSheet(id,date){const ev=id?S.events.find(x=>x.id===id):null;promptSheet(id?'Edit event':'New event',[{k:'title',label:'Title'},{k:'date',label:'Date',type:'date'},{k:'start',label:'Start',type:'clock'},{k:'end',label:'End',type:'clock'},{k:'as',label:'',type:'aspectskill'},{k:'note',label:'Note (optional)',type:'textarea'}],d=>{if(!d.title)return;const as=d.as||{};const fields={title:d.title,date:d.date||date||todayStr(),start:d.start,end:d.end,aspect:(as.aspects||[])[0]||'',aspects:as.aspects||[],skillPairs:as.skillPairs||[],note:d.note};if(ev)Object.assign(ev,fields);else S.events.push({id:uid(),...fields});save();render();},ev?{title:ev.title,date:ev.date,start:ev.start,end:ev.end,as:{aspects:itemAspects(ev),skillPairs:ev.skillPairs||[]},note:ev.note}:{date:date||calSel||todayStr(),start:'09:00',end:'10:00'});}
/* routine builder */
let routineDraft=null;
function routineSheet(rid){const r=rid?S.routines.find(x=>x.id===rid):null;routineDraft=r?{id:r.id,name:r.name,items:r.blocks.map(b=>({title:b.title,start:b.start||'',aspect:b.aspect||''}))}:{id:null,name:'',items:[]};renderRoutineEditor();}
function readRoutineDraft(){const mr=$('#modal-root');if(!mr.querySelector('[data-rname]'))return;routineDraft.name=mr.querySelector('[data-rname]').value;mr.querySelectorAll('.ritem').forEach((row,i)=>{routineDraft.items[i].title=row.querySelector('.ri-t').value;const cw=row.querySelector('[data-fclock]');routineDraft.items[i].start=cw?readClock(cw):'';});}
function renderRoutineEditor(){const d=routineDraft;
  const habitOpts=S.habits.map(h=>`<option value="h:${h.id}">🔁 ${esc(h.name)}</option>`).join('');
  const taskOpts=S.todos.filter((t,i,a)=>a.findIndex(x=>x.text===t.text)===i).slice(0,20).map(t=>`<option value="t:${t.id}">✅ ${esc(t.text)}</option>`).join('');
  sheet(`<h2>${d.id?'Edit':'New'} routine</h2>
    <div class="field"><label>Routine name</label><input class="input" data-rname placeholder="Morning Routine" value="${esc(d.name)}"/></div>
    <label class="muted small">Items (each becomes an event when applied)</label>
    <div id="ritems">${d.items.map((it,i)=>`<div class="ritem"><input class="input ri-t" value="${esc(it.title)}" placeholder="Item ${i+1}"/>${clockHTML('ritime'+i,it.start||'07:00')}<button class="iconbtn" style="width:34px;height:34px" data-act="routine-del-item" data-i="${i}">✕</button></div>`).join('')||'<p class="muted small">No items yet — add one below.</p>'}</div>
    <div class="row" style="margin:6px 0 12px"><select class="input" id="routineAdd"><option value="">+ Add from…</option><option value="new">✚ New blank item</option>${habitOpts}${taskOpts}</select><button class="btn sm" data-act="routine-add-item">Add</button></div>
    <button class="btn primary block" data-act="routine-save">Save routine</button>`);}
function applyRoutineFlow(rid,date){if(!rid){if(!S.routines.length){toast('Create a routine first');return;}sheet(`<h2>Apply routine to ${date?fmtShort(date):'a day'}</h2>${S.routines.map(r=>`<button class="btn block" style="margin-bottom:8px" data-act="apply-routine" data-id="${r.id}" data-date="${date||calSel||todayStr()}">${esc(r.name)} · ${r.blocks.length} blocks</button>`).join('')}`);return;}const r=S.routines.find(x=>x.id===rid);const d=date||calSel||todayStr();r.blocks.forEach(b=>S.events.push({id:uid(),title:b.title,date:d,start:b.start,end:'',aspect:b.aspect,note:'(from '+r.name+')'}));save();closeSheet();toast(`Applied ${r.name}`);render();}

$('#fab').addEventListener('click',()=>{const ctx=$('#fab').dataset.ctx;if(ctx==='home'||ctx==='notes'){const n=addNote(null);go({screen:'note',id:n.id});}else if(ctx==='calendar')eventSheet(null,calSel);else if(ctx==='blossom')openCosmos('goal',null,{});else if(ctx==='aspect'){const v=view();openCosmos('goal',null,{aspect:v.aspect});}else if(ctx==='skill'){const v=view();const root=skillRootNote(v.aspect,v.skill);const n=addNote(root.id);go({screen:'note',id:n.id});}else if(ctx==='map'){const v=view();const c=addNote(v.id);go({screen:'note',id:c.id});}});
setInterval(()=>{const c=$('#liveclock');if(c)c.innerHTML=liveClockHTML();
  const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');const dkey=todayStr()+' '+hm;
  S.alarms.forEach(al=>{if(!al.enabled)return;const due=(!al.days||!al.days.length||al.days.includes(DOW[now.getDay()]));if(due&&al.time===hm&&firedAlarms[al.id]!==dkey){firedAlarms[al.id]=dkey;if(al.sound!==false)fireAlarm('⏰ '+(al.label||'Alarm'));}});
  snoozes=snoozes.filter(s=>{if(Date.now()>=s.at){fireAlarm('😴 '+s.label);return false;}return true;});
  (S.timers||[]).forEach(t=>{if(t.running&&t.endAt){const rem=Math.ceil((t.endAt-Date.now())/1000);if(rem<=0){t.running=false;t.endAt=null;t.remaining=t.secs||t.minutes*60;save();fireAlarm('⏲ '+(t.label||'Timer')+' finished');if(view().screen==='alarms')render();}else{const sp=$('#tmr-'+t.id);if(sp)sp.textContent=fmtMMSS(rem);}}});
  if(stopwatch.running){const sw=$('#swdisplay');if(sw)sw.textContent=fmtMMSS(swValue());}
},1000);
document.addEventListener('pointerdown',()=>ensureAudio(),{once:true});

/* ===== PARTICLES (multiple types + custom) ===== */
const PARTICLE_TYPES={
  flowers:{label:'🌸 Flowers',behavior:'fall',chars:['🌸','❀'],size:[10,22],count:16},
  cherry:{label:'🌸 Cherry Blossom',behavior:'fall',chars:['🌸'],size:[9,17],count:20},
  snow:{label:'❄️ Snow',behavior:'snow',colors:['#ffffff','#dfeefc'],size:[2,4.5],count:55},
  rain:{label:'🌧️ Rain',behavior:'rain',colors:['#9bd0ff','#bfe2ff'],count:70},
  leaves:{label:'🍂 Leaves',behavior:'fall',chars:['🍂','🍁'],size:[12,20],count:14},
  hearts:{label:'💗 Hearts',behavior:'fall',chars:['💗','💕'],size:[10,18],count:14},
  stars:{label:'✨ Stars',behavior:'whizz',colors:['#ffffff','#fff6cc'],count:40},
  fireflies:{label:'🟡 Fireflies',behavior:'drift',colors:['#ffe08a','#d4ac60'],count:24},
  techy:{label:'💻 Techy',behavior:'matrix',colors:['#52ffae','#3df0a0'],count:48},
  bubbles:{label:'🫧 Bubbles',behavior:'rise',chars:['🫧','○'],size:[8,18],count:16},
};
const pick=a=>a[Math.floor(Math.random()*a.length)];const rnd=([a,b])=>a+Math.random()*(b-a);
let particles=[],pRAF=null;const pcanvas=$('#particles'),pctx=pcanvas.getContext('2d');
function sizeCanvas(){pcanvas.width=innerWidth;pcanvas.height=innerHeight;}
function activeSpecs(){const out=[];(S.settings.particles||[]).forEach(t=>{const c=PARTICLE_TYPES[t];if(c)out.push({...c,type:t});});
  (S.settings.customParticles||[]).forEach(cp=>out.push({behavior:cp.mode||'fall',chars:[cp.emoji||'✦'],colors:[cp.color||'#ffffff'],size:[12,22],count:cp.count||12,custom:true}));return out;}
function startParticles(){cancelAnimationFrame(pRAF);sizeCanvas();const specs=activeSpecs();particles=[];
  let budget=170;specs.forEach(sp=>{let n=sp.count||16;if(budget<=0)n=0;n=Math.min(n,budget);budget-=n;for(let i=0;i<n;i++)particles.push(makeParticle(sp,true));});
  if(!particles.length){pctx.clearRect(0,0,pcanvas.width,pcanvas.height);return;}
  (function loop(){pctx.clearRect(0,0,pcanvas.width,pcanvas.height);for(const p of particles)stepDraw(p);pRAF=requestAnimationFrame(loop);})();}
function makeParticle(sp,init){const w=pcanvas.width,h=pcanvas.height,b=sp.behavior;const base={sp,b,x:Math.random()*w};
  if(b==='whizz')return{...base,y:Math.random()*h,vx:-(0.6+Math.random()*1.6),vy:0.15+Math.random()*0.4,r:Math.random()*1.6+0.5,a:Math.random()*0.5+0.25,color:pick(sp.colors||['#fff'])};
  if(b==='rain')return{...base,y:init?Math.random()*h:-20,vy:6+Math.random()*5,len:8+Math.random()*10,a:0.25+Math.random()*0.3,color:pick(sp.colors||['#9bd0ff'])};
  if(b==='snow')return{...base,y:init?Math.random()*h:-10,vy:0.5+Math.random(),sway:Math.random()*6.28,r:rnd(sp.size||[2,4]),a:0.4+Math.random()*0.5,color:pick(sp.colors||['#fff'])};
  if(b==='matrix')return{...base,y:init?Math.random()*h:-10,vy:2+Math.random()*3,ch:Math.random()<0.5?'0':'1',s:11+Math.random()*5,a:0.3+Math.random()*0.5,color:pick(sp.colors||['#52ffae'])};
  if(b==='drift')return{...base,y:Math.random()*h,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:1.6+Math.random()*2,a:0.3+Math.random()*0.5,tw:Math.random()*6.28,color:pick(sp.colors||['#ffe08a'])};
  const rise=b==='rise';
  return{...base,y:init?Math.random()*h:(rise?h+15:-20),vy:(0.3+Math.random()*0.7)*(rise?-1:1),vx:(Math.random()-0.5)*0.5,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.05,s:rnd(sp.size||[10,20]),a:0.28+Math.random()*0.4,ch:pick(sp.chars||['✦']),color:pick(sp.colors||['#ffffff'])};}
function stepDraw(p){const w=pcanvas.width,h=pcanvas.height;
  if(p.b==='whizz'){p.x+=p.vx;p.y+=p.vy;if(p.x<-5||p.y>h+5){Object.assign(p,makeParticle(p.sp,false));p.x=w+5;p.y=Math.random()*h;}pctx.globalAlpha=p.a;pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,6.28);pctx.fill();pctx.globalAlpha=1;return;}
  if(p.b==='rain'){p.y+=p.vy;if(p.y>h+12)Object.assign(p,makeParticle(p.sp,false));pctx.globalAlpha=p.a;pctx.strokeStyle=p.color;pctx.lineWidth=1.3;pctx.beginPath();pctx.moveTo(p.x,p.y);pctx.lineTo(p.x-1.5,p.y+p.len);pctx.stroke();pctx.globalAlpha=1;return;}
  if(p.b==='snow'){p.sway+=0.02;p.y+=p.vy;p.x+=Math.sin(p.sway)*0.4;if(p.y>h+6)Object.assign(p,makeParticle(p.sp,false));pctx.globalAlpha=p.a;pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,6.28);pctx.fill();pctx.globalAlpha=1;return;}
  if(p.b==='matrix'){p.y+=p.vy;if(p.y>h+10)Object.assign(p,makeParticle(p.sp,false));pctx.globalAlpha=p.a;pctx.fillStyle=p.color;pctx.font=p.s+'px monospace';pctx.fillText(p.ch,p.x,p.y);pctx.globalAlpha=1;return;}
  if(p.b==='drift'){p.tw+=0.05;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w||p.y<0||p.y>h)Object.assign(p,makeParticle(p.sp,false));pctx.globalAlpha=p.a*(0.4+0.6*Math.abs(Math.sin(p.tw)));pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,6.28);pctx.fill();pctx.globalAlpha=1;return;}
  p.y+=p.vy;p.x+=p.vx+Math.sin(p.y/40)*0.3;p.rot+=p.vr;
  if((p.vy>0&&p.y>h+20)||(p.vy<0&&p.y<-20))Object.assign(p,makeParticle(p.sp,false));
  pctx.save();pctx.translate(p.x,p.y);pctx.rotate(p.rot);pctx.globalAlpha=p.a;pctx.font=p.s+'px serif';pctx.fillStyle=p.color;pctx.fillText(p.ch,0,0);pctx.restore();pctx.globalAlpha=1;}
addEventListener('resize',()=>{sizeCanvas();});

/* ===== PWA + BACKGROUND ALARMS ===== */
let swReg=null;
if('serviceWorker'in navigator && location.protocol!=='file:'){
  navigator.serviceWorker.register('sw.js').then(r=>{swReg=r;return navigator.serviceWorker.ready;}).then(()=>bgSync()).catch(()=>{});
}
function nextAlarmTimes(al,days){const out=[];const now=new Date();for(let i=0;i<days;i++){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);if(al.days&&al.days.length&&!al.days.includes(DOW[d.getDay()]))continue;const[h,m]=al.time.split(':').map(Number);const ts=new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m,0).getTime();if(ts>Date.now())out.push(ts);}return out;}
async function bgSync(){
  if(!('serviceWorker'in navigator))return;const reg=swReg||await navigator.serviceWorker.ready.catch(()=>null);if(!reg)return;
  const canTrigger=('showTrigger'in Notification.prototype)&&typeof TimestampTrigger!=='undefined'&&Notification.permission==='granted';
  if(!canTrigger)return; // unsupported browser -> in-app interval handles it while open
  // clear our previously scheduled (not-yet-fired) notifications, then reschedule
  try{const pend=await reg.getNotifications({includeTriggered:false});pend.forEach(n=>{if((n.tag||'').startsWith('al-')||(n.tag||'').startsWith('tm-'))n.close();});}catch(e){}
  for(const al of S.alarms){if(!al.enabled||al.sound===false)continue;for(const ts of nextAlarmTimes(al,8)){try{reg.showNotification('⏰ '+(al.label||'Alarm'),{body:new Date(ts).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}),tag:'al-'+al.id+'-'+ts,icon:'icon.svg',showTrigger:new TimestampTrigger(ts),requireInteraction:true});}catch(e){}}}
  for(const t of (S.timers||[])){if(t.running&&t.endAt&&t.endAt>Date.now()){try{reg.showNotification('⏲ '+(t.label||'Timer')+' finished',{tag:'tm-'+t.id+'-'+t.endAt,icon:'icon.svg',showTrigger:new TimestampTrigger(t.endAt)});}catch(e){}}}
}

/* BOOT */
applyTheme();render();startParticles();
</script>
