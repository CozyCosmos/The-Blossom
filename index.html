<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0E1A13" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Blossom" />
<title>The Blossom</title>
<style>
/* ============================================================ THE BLOSSOM — v3 (cozy) */
:root{
  --green:#1B4332; --green-soft:#4aa87b; --pink:#F4A4B0; --gold:#D4AC60;
  --bg:#0E1A13; --bg-2:#14241b; --card:#172c20; --card-2:#1d3527; --line:#2a4534;
  --text:#ECF3EE; --muted:#93B6A4; --muted-2:#739484;
  --physical:#52B788; --mental:#5B8DEF; --social:#B07CE8; --emotional:#E8B04B;
  --radius:20px; --radius-sm:13px; --shadow:0 10px 34px rgba(0,0,0,.34); --tab-h:64px;
}
[data-theme="light"]{
  --bg:#F7F1E8; --bg-2:#f0e8db; --card:#ffffff; --card-2:#faf4ea;
  --line:#e6dccb; --text:#22302a; --muted:#6e8074; --muted-2:#90a094;
  --shadow:0 10px 26px rgba(70,55,30,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
/* fixed full-viewport gradient layer so it never "cuts" while scrolling */
body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:var(--app-gradient, radial-gradient(140% 100% at 50% -5%, var(--grad-top, #1a3322) 0%, var(--bg) 60%));}
[data-theme="light"]{--grad-top:#fffaf0;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em;}
::selection{background:color-mix(in srgb,var(--gold) 55%, transparent);color:var(--text);}
.serif{font-family:'Georgia','Times New Roman',serif;}

#sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#skyTintTop{position:fixed;inset:0;z-index:60;pointer-events:none;mix-blend-mode:soft-light;transition:background 1.5s;display:none;}
#app{position:relative;z-index:1;}
.sky-tint{position:absolute;inset:0;transition:background 1.5s;}
.sky-stars{position:absolute;inset:0;animation:skypan 200s linear infinite;}
@keyframes skypan{0%{transform:translateX(-2.5%)}100%{transform:translateX(2.5%)}}
.sky-orbit{position:absolute;left:50%;top:64%;width:0;height:0;transition:transform 1s linear;}
.sky-orb{position:absolute;left:0;top:0;width:108px;height:108px;transition:transform .5s ease;}
.sky-orb .sky-halo{position:absolute;inset:-130px;border-radius:50%;filter:blur(14px);}
.sky-orb .sky-disc{position:absolute;inset:0;border-radius:50%;}
.sky-orb.sun .sky-disc{background:radial-gradient(circle at 50% 44%,#fff7d6 0%,#ffd76b 56%,#f3b446 100%);box-shadow:0 0 26px 4px rgba(255,210,100,.5);}
.sky-orb.sun .sky-halo{background:radial-gradient(circle,var(--gold) 0%,transparent 60%);opacity:.3;}
.sky-orb.moon{width:88px;height:88px;}
.sky-orb.moon .sky-disc{background:radial-gradient(circle at 38% 36%,#ffffff 0%,#e6ebff 56%,#bcc6ec 100%);box-shadow:0 0 24px 4px rgba(200,212,255,.45);}
.sky-orb.moon .sky-halo{background:radial-gradient(circle,#aebbff 0%,transparent 58%);opacity:.26;}
.sky-consts{position:absolute;inset:0;transition:opacity 1.5s;}
.sky-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7;animation:skytwinkle 3s ease-in-out infinite;}
.sky-const{position:absolute;overflow:visible;}
.cdot{animation:cdot-tw 3s ease-in-out infinite;}
@keyframes cdot-tw{0%,100%{opacity:.18}50%{opacity:1}}
@keyframes skytwinkle{0%,100%{opacity:.2}50%{opacity:.9}}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
#fxcanvas{position:fixed;inset:0;z-index:9999;pointer-events:none;}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));}
.screen{flex:1;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.appbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:linear-gradient(180deg, color-mix(in srgb,var(--bg) 92%,transparent), color-mix(in srgb,var(--bg) 58%,transparent));
  padding:16px 18px 13px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);}
.appbar .title{flex:1;min-width:0;}
.appbar .title h2{font-size:23px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iconbtn{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:var(--card);border:1px solid var(--line);font-size:18px;flex:none;}
.iconbtn:active{transform:scale(.94);}
.crumb-menu{margin-left:auto;width:36px;height:36px;font-size:18px;line-height:1;}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,[contenteditable]:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--pink);outline-offset:2px;border-radius:8px;}
.backbtn{font-size:15px;color:var(--pink);font-weight:600;display:flex;align-items:center;gap:4px;flex:none;}

.content{padding:16px 16px 30px;display:flex;flex-direction:column;gap:14px;}
.card{background:color-mix(in srgb,var(--card) 88%,transparent);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);backdrop-filter:blur(2px);}
.card.tight{padding:12px 14px;}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-h{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 0;}
.section-h h3{font-size:16px;}.section-h .add{color:var(--pink);font-weight:700;font-size:14px;}
.muted{color:var(--muted);}.small{font-size:13px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--card-2);border:1px solid var(--line);}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom);background:linear-gradient(180deg, color-mix(in srgb,var(--bg) 30%,transparent), var(--bg) 55%);}
.tabbar .inner{max-width:680px;width:100%;display:flex;}
.tab{flex:1;height:var(--tab-h);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;position:relative;}
.tab .ic{font-size:22px;line-height:1;transition:transform .2s;}
.tab.active{color:var(--text);}.tab.active .ic{transform:translateY(-2px) scale(1.12);}
.tab.active::before{content:"";position:absolute;top:8px;width:34px;height:34px;border-radius:50%;background:radial-gradient(circle, rgba(244,164,176,.22), transparent 70%);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:14px;font-weight:700;font-size:15px;background:var(--card-2);border:1px solid var(--line);}
.btn.primary{background:linear-gradient(135deg,var(--green-soft),color-mix(in srgb,var(--green-soft) 72%,#000));border-color:var(--green-soft);color:#fff;}
.btn.pink{background:linear-gradient(135deg,var(--pink),color-mix(in srgb,var(--pink) 82%,#000));color:#2a1015;border:none;}
.btn.gold{background:linear-gradient(135deg,var(--gold),color-mix(in srgb,var(--gold) 82%,#000));color:#2a2008;border:none;}
.btn.block{width:100%;}.btn.sm{padding:8px 12px;font-size:13px;border-radius:11px;}
.btn:active{transform:scale(.97);}
.fab{position:fixed;right:calc(50% - 320px);bottom:calc(var(--tab-h) + 18px + env(safe-area-inset-bottom));z-index:45;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--gold));color:#2a1015;font-size:28px;display:grid;place-items:center;box-shadow:0 10px 24px rgba(0,0,0,.4);}
@media(max-width:712px){.fab{right:calc(20px + env(safe-area-inset-right));}}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);}
.input,textarea.input,select.input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:15px;color:var(--text);outline:none;transition:border .15s;}
.input:focus{border-color:var(--green-soft);}
textarea.input{resize:vertical;min-height:80px;line-height:1.5;}
.row{display:flex;gap:10px;}.row>*{flex:1;}

.list-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}
.check{width:24px;height:24px;border-radius:8px;border:2px solid var(--muted-2);display:grid;place-items:center;flex:none;font-size:14px;transition:.15s;}
.check.on{background:var(--green-soft);border-color:var(--green-soft);color:#fff;}
.check.round{border-radius:50%;}
.li-text{flex:1;font-size:15px;}.li-text.done{text-decoration:line-through;color:var(--muted);}
.tag-dot{width:9px;height:9px;border-radius:50%;flex:none;}

.hstrip{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 8px;scroll-snap-type:x mandatory;}
.hstrip::-webkit-scrollbar{display:none;}
.habit-card{scroll-snap-align:start;min-width:150px;background:var(--card-2);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.habit-card .hn{font-weight:700;font-size:15px;}
.streak{font-size:13px;color:var(--gold);font-weight:700;}
.checkin{margin-top:4px;width:100%;padding:9px;border-radius:11px;font-weight:700;font-size:14px;background:var(--green-soft);color:#fff;}
.checkin.done{background:transparent;color:var(--physical);border:1px solid var(--physical);}

.goal-card{background:var(--card-2);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:8px;}
.bar{height:8px;border-radius:99px;background:var(--bg-2);overflow:hidden;}.bar>i{display:block;height:100%;border-radius:99px;}.bar.thin{height:6px;}

.ring{position:relative;flex:none;}.ring svg{transform:rotate(-90deg);}.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;}

.slider-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
.slider-row label{width:108px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
.slider-row output{width:46px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:99px;background:var(--line);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pink);border:3px solid var(--bg);box-shadow:0 2px 6px rgba(0,0,0,.4);}

.clock b{font-size:15px;}
.quote-card{display:flex;align-items:flex-start;gap:10px;}.quote-card .q{flex:1;font-style:italic;line-height:1.5;font-size:15px;}

.lvl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lvl-tile{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;gap:5px;align-items:center;}
.lvl-tile .em{font-size:20px;}.lvl-tile .lv{font-weight:800;font-size:13px;}.lvl-tile .bar{width:100%;}
.level-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:800;background:var(--bg-2);border:1px solid var(--line);}

.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding-bottom:4px;}
.cal-cell{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg-2);border:1.5px solid transparent;font-size:14px;font-weight:600;position:relative;}
.cal-cell.other{opacity:.32;}.cal-cell.today{color:var(--gold);}
.cal-cell.sel{background:var(--green-soft);color:#fff;border-color:var(--gold);}
.cal-dots{display:flex;gap:3px;height:6px;}.cal-dots i{width:5px;height:5px;border-radius:50%;}

.agenda-item{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line);}
.agenda-item:last-child{border-bottom:none;}
.agenda-item .ai-bar{width:4px;align-self:stretch;border-radius:3px;flex:none;}
.agenda-item .ai-b{flex:1;}.agenda-item .ai-b b{font-size:14px;}.agenda-item .ai-b small{color:var(--muted);}

.timeblock{display:flex;gap:10px;align-items:stretch;}
.tb-time{width:54px;flex:none;font-size:12px;color:var(--muted);font-weight:700;padding-top:2px;}
.tb-body{flex:1;border-left:2px solid var(--line);padding:0 0 14px 12px;}
.tb-event{border-radius:12px;padding:10px 12px;font-size:14px;font-weight:600;color:#fff;margin-bottom:6px;}

.daynav{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.daynav .d{flex:1;text-align:center;}.daynav .d b{font-size:16px;}.daynav .d small{display:block;color:var(--muted);}

.flower-wrap{display:grid;place-items:center;padding:6px 0 10px;}
.petal{cursor:pointer;transition:filter .2s;}.petal:active{filter:brightness(1.2);}
.blossom-stage{position:relative;display:flex;align-items:center;justify-content:center;touch-action:pan-y;}
.blossom-stage .flower-wrap{flex:1;min-width:0;}
.bv-arrow{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:22px;line-height:1;color:var(--muted);background:color-mix(in srgb,var(--card) 70%,transparent);border:1px solid var(--line);z-index:2;cursor:pointer;}
.bv-arrow:active{filter:brightness(1.25);}.bv-arrow.left{left:0;}.bv-arrow.right{right:0;}
.bv-dots{display:flex;justify-content:center;gap:8px;margin:0 0 8px;flex-wrap:wrap;}
.bv-dot{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted);font-size:11.5px;cursor:pointer;background:transparent;}
.bv-dot i{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.5;}
.bv-dot.on{color:var(--text);border-color:color-mix(in srgb,var(--gold) 60%,var(--line));background:color-mix(in srgb,var(--gold) 14%,transparent);}
.bv-dot.on i{background:var(--gold);opacity:1;}
.aspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.aspect-tile{border-radius:18px;padding:15px;display:flex;flex-direction:column;gap:5px;border:1px solid var(--line);position:relative;overflow:hidden;}
.growth-scene{padding:4px 0 2px;}
.growth-scene .petal{cursor:pointer;transition:filter .15s;}
.growth-scene .petal:active{filter:brightness(1.18);}
.gstar{cursor:pointer;transition:filter .15s;}
.peek-tip{position:fixed;z-index:10000;display:none;pointer-events:none;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 11px;box-shadow:0 6px 22px rgba(0,0,0,.3);max-width:200px;}
.peek-tip b{display:block;font-size:14px;}
.peek-tip span{display:block;font-size:11px;color:var(--muted);margin-top:1px;}
.gstar:active{filter:brightness(1.4);}
.garden-flowers{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.gf-tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 6px 10px;border-radius:18px;border:1px solid var(--line);background:var(--card-2);}
.gf-tile .growth-scene{width:100%;}
.gleg{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px;}
.gleg-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--text);font-size:12px;cursor:pointer;}
.gleg-chip i{width:8px;height:8px;border-radius:50%;flex:none;}
.garden{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.garden-tile{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;padding:14px 10px 12px;border-radius:18px;border:1px solid var(--line);background:var(--card-2);cursor:pointer;}
.garden-tile:active{filter:brightness(1.08);}
.garden-tile .g-glyph{height:84px;display:grid;place-items:center;}
.garden-tile .g-name{font-size:14px;}
.petal-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.petal-row:last-child{border-bottom:none;}
.petal-ic{width:46px;height:46px;flex:none;display:grid;place-items:center;}
.display-preview{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px 4px;}
.display-preview span{display:grid;place-items:center;}
.cat-list{display:flex;flex-direction:column;gap:8px;max-height:56vh;overflow:auto;}
.cat-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--card-2);border:1px solid var(--line);cursor:pointer;text-align:left;width:100%;}
.cat-item:active{filter:brightness(1.08);}
.cat-item.sel{border-color:color-mix(in srgb,var(--gold) 70%,var(--line));background:color-mix(in srgb,var(--gold) 14%,var(--card-2));}
.cat-check{width:20px;flex:none;color:var(--gold);font-weight:800;text-align:center;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 0;}
.set-row span{font-size:13.5px;}
.set-sec{font-size:15px;color:var(--gold);margin:0 0 8px;}
.dbg-row{display:flex;align-items:center;gap:10px;padding:4px 0;}
.dbg-row .dl{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dbg-row input[type=range]{flex:1;}
.dbg-row .lv{width:30px;text-align:right;font-weight:700;color:var(--gold);font-size:12px;}
.dbg-head{margin:16px 0 4px;padding:6px 10px;border-radius:10px;background:color-mix(in srgb,var(--gold) 12%,var(--card-2));border:1px solid color-mix(in srgb,var(--gold) 30%,var(--line));font-weight:700;font-size:14px;}
.dbg-head:first-child{margin-top:4px;}
.input.mini{width:78px;flex:none;padding:6px 8px;text-align:center;}
.cat-em{font-size:26px;flex:none;}
body.noemoji .cat-em{display:none;}
.aspect-tile .em{position:absolute;right:10px;top:8px;font-size:24px;opacity:.55;}
.aspect-tile .lv{font-size:24px;font-weight:800;}.aspect-tile .nm{font-weight:700;}
.aspect-add{border:1.5px dashed var(--line);border-radius:18px;display:grid;place-items:center;min-height:96px;color:var(--muted);font-weight:700;background:transparent;}

.skill-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);}
.skill-row:last-child{border-bottom:none;}
.skill-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:none;background:var(--card-2);}
.skill-row .chev{color:var(--muted);font-size:20px;}

.body-zone{cursor:pointer;transition:.15s;}.body-zone:active{opacity:.7;}
.bodytoggle{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:12px;width:max-content;margin:0 auto 8px;}
.bodytoggle button{padding:7px 16px;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted);}
.bodytoggle button.on{background:var(--green-soft);color:#fff;}

.crumbs{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:12px;color:var(--muted);padding:0 2px 6px;}
.crumbs a{color:var(--pink);font-weight:600;}.crumbs span.sep{opacity:.5;}
.page-head{display:flex;align-items:center;gap:10px;}
.page-emoji{font-size:30px;width:48px;height:48px;border-radius:13px;display:grid;place-items:center;background:var(--bg-2);border:1px solid var(--line);flex:none;}
.page-title{flex:1;font-size:25px;font-weight:800;border:none;background:transparent;outline:none;padding:2px 0;}

/* doc editor (Notion + Docs feel) */
.doctoolbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--tab-h) + 8px + env(safe-area-inset-bottom));z-index:46;width:calc(100% - 20px);max-width:660px;display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:var(--shadow);scrollbar-width:none;}
.doctoolbar::-webkit-scrollbar{display:none;}
.doctoolbar button{flex:none;}

}

function habitStreak(h){let s=0,gr=S.settings.graceDays||0,d=new Date();if(!habitDone(h,todayStr()))d.setDate(d.getDate()-1);for(;;){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(habitDone(h,k)){s++;}else if(gr>0){gr--;}else break;d.setDate(d.getDate()-1);}return s;}
function longestStreak(h){const days=Object.keys(h.logs).filter(k=>habitDone(h,k)).sort();let best=0,cur=0,prev=null;for(const k of days){if(prev&&daysBetween(prev,k)===1)cur++;else cur=1;best=Math.max(best,cur);prev=k;}return best;}
function habitConsistency(h,days=14){let c=0,t=new Date();for(let i=0;i<days;i++){const dd=new Date(t.getTime()-i*864e5);const k=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');if(habitDone(h,k))c++;}return Math.round(c/days*100);}
function rubric(p){if(p>=90)return{g:'A',c:'var(--physical)'};if(p>=75)return{g:'B',c:'var(--gold)'};if(p>=60)return{g:'C',c:'var(--emotional)'};return{g:'Re-root',c:'var(--pink)'};}

/* ---- Blossom → Petal → Skill resolution & XP (id-based rollups) ---- */
function blossomPetals(b){return (b&&b.petals)||[];}
function findSkill(skillId){for(const bid of Object.keys(S.aspects)){const b=S.aspects[bid];for(const p of blossomPetals(b)){const s=(p.skills||[]).find(x=>x.id===skillId);if(s)return{bid,blossom:b,petal:p,skill:s};}}return null;}
function findPetal(petalId){for(const bid of Object.keys(S.aspects)){const b=S.aspects[bid];const p=blossomPetals(b).find(x=>x.id===petalId);if(p)return{bid,blossom:b,petal:p};}return null;}
function xpBump(key,amt){S.xp[key]=Math.max(0,(S.xp[key]||0)+amt);if(amt>0)flyXP(amt);}
const skillXP=id=>S.xp['s:'+id]||0;
function petalXP(p){let t=S.xp['p:'+p.id]||0;(p.skills||[]).forEach(s=>t+=skillXP(s.id));return t;}
function aspectXP(bid){const b=S.aspects[bid];if(!b)return 0;let t=S.xp['b:'+bid]||0;blossomPetals(b).forEach(p=>t+=petalXP(p));return t;}
const itemAspects=x=>(x.aspects&&x.aspects.length?x.aspects:(x.aspect?[x.aspect]:[]));
const itemSkills=x=>(x.skillIds&&x.skillIds.length?x.skillIds:[]);
function itemSkillNames(x){return itemSkills(x).map(id=>{const fs=findSkill(id);return fs?fs.skill.name:null;}).filter(Boolean);}
function gainItemXP(it,amt){const sids=itemSkills(it);let buckets;
  if(sids.length)buckets=sids.map(id=>'s:'+id);
  else buckets=itemAspects(it).map(b=>'b:'+b);
  if(!buckets.length)return;const per=amt/buckets.length;buckets.forEach(k=>xpBump(k,Math.round(per)));}
/* back-compat: award XP to a blossom by id (resolves a skill name if given) */
function gainXP(bid,skillName,amt){if(!bid||!S.aspects[bid])return;if(skillName){const b=S.aspects[bid];for(const p of blossomPetals(b)){const sk=(p.skills||[]).find(x=>x.name===skillName);if(sk){xpBump('s:'+sk.id,amt);return;}}}xpBump('b:'+bid,amt);}
/* XP weight from importance / difficulty / time (each 1..5, default 3) */
function xpWeight(it){const imp=it.importance||3,dif=it.difficulty||3,tim=it.effort||3;const scale=(S.settings&&S.settings.xpScale)||6;return Math.max(1,Math.round(scale*(imp+dif+tim)/3));}
/* goal XP tracked so re-sliding progress can't farm XP */
function syncGoalXP(g){const target=Math.round((clamp(g.progress||0,0,100)/100)*xpWeight(g));const given=g.xpGiven||0;const delta=target-given;if(delta!==0){gainItemXP(g,delta);g.xpGiven=target;}}
const habitRepeat=h=>(h.cosmos&&h.cosmos.repeat)||1;
const habitDone=(h,d)=>(h.logs[d]||0)>=habitRepeat(h);
const totalXpForLevel=L=>((S.settings&&S.settings.xpCurve)||50)*L*(L-1);
function levelFromXp(xp){let L=1;while(totalXpForLevel(L+1)<=xp)L++;return L;}
function levelInfo(xp){const L=levelFromXp(xp),a=totalXpForLevel(L),b=totalXpForLevel(L+1);return{level:L,pct:Math.round((xp-a)/(b-a)*100),cur:xp-a,need:b-a};}
// debug: force a blossom/petal/skill to an exact level by setting its XP bucket (rollups accounted for)
function setNodeLevel(kind,id,L){const target=totalXpForLevel(Math.max(0,L));
  if(kind==='skill'){S.xp['s:'+id]=target;}
  else if(kind==='petal'){const fp=findPetal(id);if(!fp)return;const sum=(fp.petal.skills||[]).reduce((a,s)=>a+skillXP(s.id),0);S.xp['p:'+id]=Math.max(0,target-sum);}
  else if(kind==='blossom'){const b=S.aspects[id];if(!b)return;let sum=0;blossomPetals(b).forEach(p=>sum+=petalXP(p));S.xp['b:'+id]=Math.max(0,target-sum);}
  save();}
function flyXP(amt){const e=document.createElement('div');e.className='xpfly';e.textContent='+'+amt+' XP';e.style.left=(innerWidth/2-20)+'px';e.style.top=(innerHeight-160)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),1000);}

function aspectScore(key){const H=(S.settings&&S.settings.health)||{habits:true,goals:true,trackers:true};const win=(S.settings&&S.settings.healthWindow)||14;
  const hs=S.habits.filter(h=>itemAspects(h).includes(key)),gs=S.goals.filter(g=>itemAspects(g).includes(key));let parts=[];
  if(H.habits!==false&&hs.length)parts.push(hs.reduce((a,h)=>a+habitConsistency(h,win),0)/hs.length);
  if(H.goals!==false&&gs.length)parts.push(gs.reduce((a,g)=>a+(g.progress||0),0)/gs.length);
  if(H.trackers!==false){const r=lastTrackerAvg();if(r!=null)parts.push(r);}
  if(!parts.length)return 0;return Math.round(parts.reduce((a,b)=>a+b,0)/parts.length);}
function lastTrackerAvg(){const dates=Object.keys(S.trackerLog).sort().slice(-7);if(!dates.length)return null;let sum=0,n=0;dates.forEach(dt=>{S.trackers.forEach(tr=>{const v=S.trackerLog[dt][tr.id];if(v!=null){sum+=v/tr.max*100;n++;}});});return n?sum/n:null;}
function todayCompletion(){const t=todayStr();const items=agendaFor(t);const total=items.length;if(!total)return 0;const done=items.filter(it=>it.done).length;return Math.round(done/total*100);}
function bestStreakAll(){return S.habits.reduce((m,h)=>Math.max(m,habitStreak(h)),0);}

/* unified agenda for a date: habits due, todos, goal tasks, events, milestones */
function agendaFor(ds){const wd=new Date(ds+'T00:00').getDay();const items=[];
  S.habits.forEach(h=>{const days=(h.cosmos&&h.cosmos.days)||[];if(days.length===0||days.includes(DOW[wd]))items.push({kind:'habit',id:h.id,date:ds,text:h.name,aspect:h.aspect,done:habitDone(h,ds),count:h.logs[ds]||0,rep:habitRepeat(h),streak:habitStreak(h)});});
  S.todos.forEach(td=>{const rec=td.days&&td.days.length;const show=rec?td.days.includes(DOW[wd]):td.date===ds;if(show){const done=rec?!!(td.doneDates&&td.doneDates[ds]):td.done;items.push({kind:'todo',id:td.id,text:td.text,aspect:td.aspect,done,recurring:rec});}});
  S.goals.forEach(g=>{const days=(g.cosmos&&g.cosmos.days)||[];if(days.includes(DOW[wd]))items.push({kind:'goaltask',id:g.id,text:'🎯 '+g.name,aspect:g.aspect,done:false});
    if(g.targetDate===ds)items.push({kind:'goaltarget',id:g.id,text:'🏁 Target: '+g.name,aspect:g.aspect,done:(g.progress||0)>=100});
    (g.cosmos&&g.cosmos.milestones||[]).forEach(m=>{if(m.date===ds)items.push({kind:'milestone',id:g.id,text:'⛳ '+m.text,aspect:g.aspect,done:false});});});
  S.events.forEach(e=>{const end=e.endDate||e.date;if(ds>=e.date&&ds<=end){const span=end>e.date;const tot=span?daysBetween(e.date,end)+1:0;const dn=span?daysBetween(e.date,ds)+1:0;items.push({kind:'event',id:e.id,text:(e.start?e.start+' ':'')+e.title+(span?` (day ${dn}/${tot})`:''),aspect:e.aspect,done:false});}});
  return items;}
function dayAspectDots(ds){return [...new Set(agendaFor(ds).map(i=>i.aspect).filter(Boolean))].slice(0,4);}

/* ---- CALENDAR (week default, swap month/day) ---- */
let calCursor=new Date();let calSel=todayStr();let calView='week';
function weekDays(ds){const d=new Date(ds+'T00:00');const start=new Date(d);start.setDate(d.getDate()-d.getDay());const out=[];for(let i=0;i<7;i++){const x=new Date(start);x.setDate(start.getDate()+i);out.push(x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'));}return out;}
function timelineHTML(date){const startH=S.settings.dayStart??0,endH=S.settings.dayEnd??24,hh=48;const toMin=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
  const evs=S.events.filter(e=>e.start&&date>=e.date&&date<=(e.endDate||e.date)).sort((a,b)=>a.start.localeCompare(b.start));
  const lanes=[];evs.forEach(e=>{const s=toMin(e.start);const en=e.end?toMin(e.end):s+60;e._s=s;e._e=Math.max(en,s+30);let li=lanes.findIndex(end=>end<=s);if(li<0){li=lanes.length;lanes.push(0);}lanes[li]=e._e;e._lane=li;});
  const nL=Math.max(1,lanes.length);
  let hrs='';for(let h=startH;h<endH;h++)hrs+=`<div class="tl-hour"><span>${(h%12||12)}${h<12?'a':'p'}</span></div>`;
  const track=evs.map(e=>{const top=(e._s-startH*60)/60*hh;const height=Math.max(24,(e._e-e._s)/60*hh-3);const w=100/nL;const left=e._lane*w;
    return `<div class="tl-event" data-act="edit-event" data-id="${e.id}" style="top:${top}px;height:${height}px;left:${left}%;width:calc(${w}% - 6px);right:auto;background:${aspectHex(e.aspect)}"><b>${esc(e.title)}</b>${height>34?`<br><small>${e.start}${e.end?'–'+e.end:''}</small>`:''}</div>`;}).join('');
  return `<div class="tl" style="height:${(endH-startH)*hh}px"><div style="position:absolute;inset:0">${hrs}</div><div class="tl-track">${track}</div></div>`;}
function weekGridHTML(week){const startH=S.settings.dayStart??0,endH=S.settings.dayEnd??24,hh=42,rows=endH-startH;const t=todayStr();const toMin=tm=>{const[h,m]=tm.split(':').map(Number);return h*60+m;};
  const head=`<div class="wgrid-head"><div></div>${week.map(ds=>{const dt=new Date(ds+'T00:00');return `<div class="wgh ${ds===t?'today':''} ${ds===calSel?'sel':''}" data-act="cal-sel" data-date="${ds}"><small>${['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()]}</small><b>${dt.getDate()}</b></div>`;}).join('')}</div>`;
  const allday=`<div class="wgrid-head"><div></div>${week.map(ds=>{const items=agendaFor(ds).filter(a=>a.kind!=='event'&&!(a.kind==='todo'&&(S.todos.find(td=>td.id===a.id)||{}).time));const dots=[...new Set(items.map(i=>i.aspect).filter(Boolean))].slice(0,3);return `<div class="wg-allday">${dots.map(a=>`<i style="background:${aspectHex(a)}"></i>`).join('')||(items.length?'<i style="background:var(--muted)"></i>':'')}</div>`;}).join('')}</div>`;
  let times='';for(let h=startH;h<endH;h++)times+=`<div class="wg-time" style="height:${hh}px"><span>${(h%12||12)}${h<12?'a':'p'}</span></div>`;
  const cols=week.map(ds=>{const wd2=new Date(ds+'T00:00').getDay();const evs=S.events.filter(e=>e.start&&ds>=e.date&&ds<=(e.endDate||e.date));const tt=S.todos.filter(td=>td.time&&((td.days&&td.days.length)?td.days.includes(DOW[wd2]):td.date===ds)).map(td=>({id:td.id,title:td.text,start:td.time,end:'',aspect:td.aspect,todo:1}));
    let lines='';for(let h=startH;h<endH;h++)lines+=`<div style="position:absolute;left:0;right:0;top:${(h-startH)*hh}px;border-top:1px solid var(--line)"></div>`;
    const blocks=[...evs,...tt].map(e=>{const s=toMin(e.start);const en=e.end?toMin(e.end):s+45;const top=(s-startH*60)/60*hh;const height=Math.max(13,(en-s)/60*hh-2);return `<div class="wg-ev" data-act="${e.todo?'edit-todo':'edit-event'}" data-id="${e.id}" style="top:${top}px;height:${height}px;background:${aspectHex(e.aspect)||'var(--muted-2)'}">${esc(e.title)}</div>`;}).join('');
    return `<div class="wg-day" style="height:${rows*hh}px">${lines}${blocks}</div>`;}).join('');
  const spanEvs=S.events.filter(e=>e.endDate&&e.endDate>e.date&&e.date<=week[6]&&e.endDate>=week[0]);
  let spanRow='';if(spanEvs.length){spanRow=`<div style="display:flex;margin-bottom:4px"><div style="width:30px;flex:none"></div><div style="flex:1;position:relative;height:${spanEvs.length*18}px">${spanEvs.map((e,i)=>{const sc=Math.max(0,daysBetween(week[0],e.date)),ec=Math.min(6,daysBetween(week[0],e.endDate));const left=sc/7*100,wp=(ec-sc+1)/7*100;return `<div data-act="edit-event" data-id="${e.id}" style="position:absolute;top:${i*18}px;left:${left}%;width:calc(${wp}% - 2px);height:16px;background:${aspectHex(e.aspect)||'var(--muted-2)'};border-radius:4px;color:#fff;font-size:9px;line-height:16px;padding:0 5px;overflow:hidden;white-space:nowrap">${esc(e.title)}</div>`;}).join('')}</div></div>`;}
  return `${head}${spanRow}${allday}<div class="gwrap"><div class="wgrid" style="min-width:${30+7*46}px"><div class="wg-times">${times}</div><div class="wg-days">${cols}</div></div></div>`;}
SCREENS.calendar=function(){
  const t=todayStr();
  const toggle=`<div class="calview">${[['day','Day'],['week','Week'],['month','Month']].map(([v,l])=>`<button class="${calView===v?'on':''}" data-act="cal-view" data-view="${v}">${l}</button>`).join('')}</div>`;
  let head='';
  if(calView==='month'){const y=calCursor.getFullYear(),m=calCursor.getMonth();const startDow=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const cells=[];
    for(let i=0;i<startDow;i++)cells.push({d:new Date(y,m,0-(startDow-1-i)),other:true});for(let i=1;i<=dim;i++)cells.push({d:new Date(y,m,i),other:false});while(cells.length%7)cells.push({d:new Date(y,m+1,cells.length-startDow-dim+1),other:true});
    head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${calCursor.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h3><button class="iconbtn" data-act="cal-next">›</button></div>
      <div class="cal-grid">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells.map(c=>{const ds=c.d.getFullYear()+'-'+String(c.d.getMonth()+1).padStart(2,'0')+'-'+String(c.d.getDate()).padStart(2,'0');const dots=dayAspectDots(ds);return `<button class="cal-cell ${c.other?'other':''} ${ds===t?'today':''} ${ds===calSel?'sel':''}" data-act="cal-sel" data-date="${ds}">${c.d.getDate()}<div class="cal-dots">${dots.map(a=>`<i style="background:${aspectHex(a)}"></i>`).join('')}</div></button>`;}).join('')}</div>`;
  }else if(calView==='week'){const wk=weekDays(calSel);const lbl=fmtShort(wk[0])+' – '+fmtShort(wk[6]);
    head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${lbl}</h3><button class="iconbtn" data-act="cal-next">›</button></div>${weekGridHTML(wk)}`;
  }else{const dt=new Date(calSel+'T00:00');head=`<div class="cal-head"><button class="iconbtn" data-act="cal-prev">‹</button><h3>${dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</h3><button class="iconbtn" data-act="cal-next">›</button></div>`;}
  const nonTimed=agendaFor(calSel).filter(a=>a.kind!=='event');
  return `<div class="content">
    <div class="card">${toggle}${head}</div>
    <div class="section-h"><h3>${esc(fmtDate(calSel))}</h3><div><button class="add" data-act="new-todo" data-date="${calSel}">+ Task</button> &nbsp;<button class="add" data-act="new-event" data-date="${calSel}">+ Event</button></div></div>
    ${nonTimed.length?`<div class="card tight">${nonTimed.map(a=>agendaHTML(a,calSel)).join('')}</div>`:''}
    ${calView==='day'?`<div class="card"><h3>🕒 Timeline</h3>${timelineHTML(calSel)}</div>`:''}
    <button class="btn block" data-act="apply-routine-to" data-date="${calSel}">🔁 Apply routine</button>
    <div class="section-h"><h3>🔁 Routine Templates</h3><button class="add" data-act="new-routine">+ Routine</button></div>
    <div class="card tight">${S.routines.length?S.routines.map(routineHTML).join(''):'<div class="empty">Build a routine</div>'}</div>
  </div>`;};
function routineHTML(r){return `<div class="list-item"><span class="li-text" data-act="edit-routine" data-id="${r.id}"><b>${esc(r.name)}</b> <small class="muted">· ${r.blocks.length} items</small></span><button class="btn sm" data-act="apply-routine" data-id="${r.id}">Apply…</button><button class="iconbtn" style="width:30px;height:30px;font-size:13px" data-act="del-routine" data-id="${r.id}">✕</button></div>`;}
SCREENS.day=function(v){const date=v.date;calSel=date;calView='day';return SCREENS.calendar();};
function calNav(dir){if(calView==='month'){calCursor.setMonth(calCursor.getMonth()+dir);}else if(calView==='week'){calSel=dateAdd(calSel,dir*7);calCursor=new Date(calSel+'T00:00');}else{calSel=dateAdd(calSel,dir);calCursor=new Date(calSel+'T00:00');}}

const fmtMMSS=s=>`${Math.floor(Math.max(0,s)/60)}:${String(Math.floor(Math.max(0,s))%60).padStart(2,'0')}`;
let stopwatch={running:false,startedAt:0,elapsed:0};

SCREENS.alarms=function(){const alarms=S.alarms.slice().sort((a,b)=>a.time.localeCompare(b.time));const timers=S.timers||[];

function alarmRow(a){const rep=a.days&&a.days.length?a.days.join(' '):'Every day';return `<div class="list-item"><button class="check round ${a.enabled?'on':''}" data-act="toggle-alarm" data-id="${a.id}">${a.enabled?'✓':''}</button><span class="li-text" data-act="edit-alarm" data-id="${a.id}"><b style="font-size:17px">${a.time}</b> &nbsp;${esc(a.label||'Alarm')}<br><small class="muted">${rep}${a.sound===false?' · 🔇':' · 🔔'}</small></span><button class="iconbtn" style="width:30px;height:30px;font-size:13px" data-act="del-alarm" data-id="${a.id}">✕</button></div>`;}
function timerRow(t){const tot=t.secs||t.minutes*60;const rem=t.running&&t.endAt?Math.ceil((t.endAt-Date.now())/1000):(t.remaining!=null?t.remaining:tot);return `<div class="list-item"><span class="li-text"><b>${esc(t.label||'Timer')}</b><br><span id="tmr-${t.id}" style="font-size:20px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums">${fmtMMSS(rem)}</span></span>
  <button class="btn sm" data-act="timer-toggle" data-id="${t.id}">${t.running?'⏸':'▶'}</button>

/* audio + notifications */
let audioCtx=null,beepTimer=null,alarmAudio=null,previewAudio=null;
function ensureAudio(){if(!audioCtx){try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}
async function startAlarmSound(trackId){stopAlarmSound();const tid=trackId||S.settings.alarmTrack;if(tid){const blob=await idbGet(tid);if(blob){alarmAudio=new Audio(URL.createObjectURL(blob));alarmAudio.loop=true;alarmAudio.play().catch(()=>{});return;}}ensureAudio();if(!audioCtx)return;let on=false;const beep=()=>{on=!on;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=on?880:660;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(0.3,t+0.02);g.gain.linearRampToValueAtTime(0.0001,t+0.34);o.start(t);o.stop(t+0.36);};beep();beepTimer=setInterval(beep,460);}
function stopAlarmSound(){if(beepTimer){clearInterval(beepTimer);beepTimer=null;}if(alarmAudio){try{alarmAudio.pause();}catch(e){}alarmAudio=null;}}
/* gentle chime + haptics */
function playChime(){if(!S.settings.chime)return;ensureAudio();if(!audioCtx)return;const ctx=audioCtx,t=ctx.currentTime;
  const notes=[523.25,659.25,783.99,1046.50];// C5 E5 G5 C6 — gentle uplifting arpeggio
  notes.forEach((f,i)=>{const dt=i*0.085;const o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain(),g2=ctx.createGain();
    o.type='sine';o2.type='sine';o.frequency.value=f;o2.frequency.value=f*2.001;g2.gain.value=0.22;// soft octave shimmer
    o2.connect(g2);g2.connect(g);o.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001,t+dt);g.gain.exponentialRampToValueAtTime(0.12,t+dt+0.03);g.gain.exponentialRampToValueAtTime(0.0001,t+dt+0.7);
    o.start(t+dt);o2.start(t+dt);o.stop(t+dt+0.74);o2.stop(t+dt+0.74);});}
function haptic(ms){try{if(S.settings.haptics&&navigator.vibrate)navigator.vibrate(ms||14);}catch(e){}}
/* ambience (generated + custom mp3) */
let ambNodes=null,ambAudio=null;
function noiseBuffer(ctx,brown){const len=ctx.sampleRate*2,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;if(brown){last=(last+0.02*w)/1.02;d[i]=last*3.5;}else d[i]=w;}return buf;}
function stopAmbience(){if(ambNodes){ambNodes.forEach(n=>{try{n.stop&&n.stop();}catch(e){}try{n.disconnect&&n.disconnect();}catch(e){}});ambNodes=null;}if(ambAudio){try{ambAudio.pause();}catch(e){}ambAudio=null;}}
async function startAmbience(kind){stopAmbience();if(!kind)return;ensureAudio();const ctx=audioCtx;if(!ctx)return;const vol=S.settings.ambienceVol||0.4;
  if(kind.indexOf('track:')===0){const blob=await idbGet(kind.slice(6));if(!blob)return;ambAudio=new Audio(URL.createObjectURL(blob));ambAudio.loop=true;ambAudio.volume=vol;ambAudio.play().catch(()=>{});return;}
  const out=ctx.createGain();out.gain.value=vol;out.connect(ctx.destination);ambNodes=[out];
  if(kind==='pad'){[220,277,330].forEach((f,i)=>{const o=ctx.createOscillator();o.type='sine';o.frequency.value=f;const g=ctx.createGain();g.gain.value=0.1;o.connect(g);g.connect(out);o.start();ambNodes.push(o,g);const lfo=ctx.createOscillator();lfo.frequency.value=0.05+i*0.02;const lg=ctx.createGain();lg.gain.value=0.04;lfo.connect(lg);lg.connect(g.gain);lfo.start();ambNodes.push(lfo,lg);});return;}
  const src=ctx.createBufferSource();src.buffer=noiseBuffer(ctx,kind==='ocean'||kind==='brown'||kind==='forest');src.loop=true;const filt=ctx.createBiquadFilter();
  if(kind==='rain'){filt.type='bandpass';filt.frequency.value=1300;filt.Q.value=0.5;}else if(kind==='forest'){filt.type='lowpass';filt.frequency.value=750;}else if(kind==='ocean'){filt.type='lowpass';filt.frequency.value=480;}else{filt.type='lowpass';filt.frequency.value=2200;}
  src.connect(filt);filt.connect(out);src.start();ambNodes.push(src,filt);
  if(kind==='ocean'){const lfo=ctx.createOscillator();lfo.frequency.value=0.12;const lg=ctx.createGain();lg.gain.value=vol*0.55;lfo.connect(lg);lg.connect(out.gain);lfo.start();ambNodes.push(lfo,lg);}}
function setAmbVol(v){S.settings.ambienceVol=v;if(ambNodes&&ambNodes[0]&&ambNodes[0].gain)ambNodes[0].gain.value=v;if(ambAudio)ambAudio.volume=v;}
/* background music player (shared mp3 tracks) */
let musicEl=null,musicIdx=-1,musicPlaying=false;
function musicAudio(){if(!musicEl){musicEl=new Audio();musicEl.addEventListener('ended',()=>musicNext());}return musicEl;}
async function musicPlayIdx(i){const tr=(S.settings.tracks||[])[i];if(!tr)return;const blob=await idbGet(tr.id);if(!blob)return;const a=musicAudio();a.src=URL.createObjectURL(blob);a.play().catch(()=>{});musicIdx=i;musicPlaying=true;updateMusicUI();}
function musicToggle(){const t=S.settings.tracks||[];if(!t.length){openPlaylist();return;}const a=musicAudio();if(musicPlaying){a.pause();musicPlaying=false;updateMusicUI();}else if(musicIdx<0||!a.src){musicPlayIdx(0);}else{a.play().catch(()=>{});musicPlaying=true;updateMusicUI();}}
function musicNext(){const t=S.settings.tracks||[];if(!t.length)return;musicPlayIdx((musicIdx+1)%t.length);}
function musicPrev(){const t=S.settings.tracks||[];if(!t.length)return;musicPlayIdx((musicIdx-1+t.length)%t.length);}
function curTrackName(){const t=(S.settings.tracks||[])[musicIdx];return t?t.name:'';}
function homeMusicHTML(){const t=S.settings.tracks||[];return `<div id="homeMusic" style="display:flex;align-items:center;gap:5px;min-width:0;flex:1">${t.length?`<button class="iconbtn" style="width:32px;height:32px;font-size:12px" data-act="music-toggle">${musicPlaying?'⏸':'▶'}</button><button class="iconbtn" style="width:32px;height:32px;font-size:12px" data-act="music-next">⏭</button><span class="small muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1" data-act="open-playlist">${esc(curTrackName()||'Playlist')}</span>`:`<button class="btn sm" data-act="open-playlist">🎵 Add music</button>`}</div>`;}
function updateMusicUI(){const el=$('#homeMusic');if(el)el.outerHTML=homeMusicHTML();const pb=$('#playlistBox');if(pb)pb.innerHTML=playlistHTML();}
function playlistHTML(){const t=S.settings.tracks||[];if(!t.length)return '<p class="muted small">No tracks yet. Add an mp3 below.</p>';return t.map((tr,i)=>`<div class="list-item"><button class="iconbtn" style="width:32px;height:32px;font-size:12px" data-act="music-play" data-i="${i}">${musicPlaying&&musicIdx===i?'⏸':'▶'}</button><span class="li-text" style="${musicIdx===i?'color:var(--gold)':''}">🎵 ${esc(tr.name)}</span><button class="btn sm ${S.settings.alarmTrack===tr.id?'gold':''}" data-act="set-alarm-track" data-id="${tr.id}">🔔</button><button class="iconbtn" style="width:30px;height:30px;font-size:12px" data-act="del-track" data-id="${tr.id}">✕</button></div>`).join('');}
function openPlaylist(){sheet(`<h2>🎵 Playlist</h2><div id="playlistBox">${playlistHTML()}</div><button class="btn pink block" style="margin-top:10px" data-act="upload-music">＋ Add mp3</button>`);}
/* IndexedDB for custom audio */
let _idb=null;
function openIDB(){return new Promise((res,rej)=>{if(_idb)return res(_idb);const r=indexedDB.open('blossomAudio',1);r.onupgradeneeded=()=>r.result.createObjectStore('audio');r.onsuccess=()=>{_idb=r.result;res(_idb);};r.onerror=()=>rej(r.error);});}
async function idbPut(k,blob){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction('audio','readwrite');tx.objectStore('audio').put(blob,k);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function idbGet(k){const db=await openIDB().catch(()=>null);if(!db)return null;return new Promise(res=>{const tx=db.transaction('audio','readonly');const rq=tx.objectStore('audio').get(k);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>res(null);});}
async function idbDel(k){const db=await openIDB().catch(()=>null);if(!db)return;const tx=db.transaction('audio','readwrite');tx.objectStore('audio').delete(k);}
function requestNotify(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission().then(()=>{if(Notification.permission==='granted'&&typeof bgSync==='function')bgSync();});}
function notify(t,b){if('Notification'in window&&Notification.permission==='granted'){try{new Notification(t,{body:b});}catch(e){}}}

/* ===== 6. SVG ===== */
function ringSVG(pct,size=78,color='var(--pink)'){const r=(size-12)/2,c=2*Math.PI*r,off=c*(1-pct/100);return `<div class="ring" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--line)" stroke-width="8" fill="none"/><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg><div class="lbl" style="font-size:${size*0.23}px">${pct}%</div></div>`;}
/* ===== GROWTH DISPLAYS (theme-matched, capped) ===== */
let _gid=0;
function growth(level){return Math.min(1,(Math.max(1,level||1)-1)/14);}// 0..1, caps ~Lv15 (size & brightness cap)
function safeHex(h){return (typeof h==='string'&&h[0]==='#')?h:'#7faf95';}
function _h2r(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function _r2h(r){return '#'+r.map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');}
function mixHex(a,b,t){const A=_h2r(safeHex(a)),B=_h2r(safeHex(b));return _r2h([0,1,2].map(i=>A[i]+(B[i]-A[i])*t));}
function lighten(h,t){return mixHex(h,'#ffffff',t);}
function svgBox(size,inner){return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="display:block;overflow:visible" pointer-events="none">${inner}</svg>`;}
// ---- shared: skill = a star that starts dim and glows brighter with level (brightness capped) ----
function dStar(level,hex,size){const g=growth(level);const col=lighten(hex,0.1+0.45*g);const a=(0.32+0.58*g).toFixed(2);const r=30+12*g;
  const glow=`<circle cx="50" cy="50" r="${(16+20*g).toFixed(0)}" fill="${col}" opacity="${(0.08+0.18*g).toFixed(2)}"/>`;
  const p=`M50 ${(50-r).toFixed(1)} L${(50+r*0.28).toFixed(1)} ${(50-r*0.28).toFixed(1)} L${(50+r).toFixed(1)} 50 L${(50+r*0.28).toFixed(1)} ${(50+r*0.28).toFixed(1)} L50 ${(50+r).toFixed(1)} L${(50-r*0.28).toFixed(1)} ${(50+r*0.28).toFixed(1)} L${(50-r).toFixed(1)} 50 L${(50-r*0.28).toFixed(1)} ${(50-r*0.28).toFixed(1)} Z`;
  return svgBox(size,`${glow}<path d="${p}" fill="${col}" opacity="${a}"/>`);}
// ---- forest ----
function dTree(level,hex,size){const g=growth(level);const col=lighten(hex,0.04+0.22*g);const th=20+18*g,baseY=90,topT=baseY-th,rc=12+16*g,cy=topT-rc*0.5;
  return svgBox(size,`<rect x="${(50-3-g*1.5).toFixed(1)}" y="${topT.toFixed(1)}" width="${(6+g*3).toFixed(1)}" height="${th.toFixed(1)}" rx="2" fill="#7a5230"/>
   <circle cx="${(50-rc*0.62).toFixed(1)}" cy="${(cy+rc*0.32).toFixed(1)}" r="${(rc*0.72).toFixed(1)}" fill="${col}"/>
   <circle cx="${(50+rc*0.62).toFixed(1)}" cy="${(cy+rc*0.32).toFixed(1)}" r="${(rc*0.72).toFixed(1)}" fill="${col}"/>
   <circle cx="50" cy="${cy.toFixed(1)}" r="${rc.toFixed(1)}" fill="${col}"/>
   <circle cx="50" cy="${(cy-rc*0.25).toFixed(1)}" r="${(rc*0.58).toFixed(1)}" fill="${lighten(col,0.12)}"/>`);}
function dRoot(level,hex,size){const g=growth(level);const col=lighten(hex,0.04+0.18*g);const len=22+30*g;
  return svgBox(size,`<g stroke="${col}" stroke-width="${(3+g*2).toFixed(1)}" fill="none" stroke-linecap="round">

function seasonInfo(){const m=new Date().getMonth();return (m<2||m===11)?{name:'Winter',emoji:'❄️',tint:'#9fc7e8'}:m<5?{name:'Spring',emoji:'🌷',tint:'#f4a4b0'}:m<8?{name:'Summer',emoji:'☀️',tint:'#e8b04b'}:{name:'Autumn',emoji:'🍂',tint:'#d98a52'};}
function gardenMomentum(){if(!S.habits.length)return 'resting — plant a habit to begin 🌱';const mo=Math.round(S.habits.reduce((a,h)=>a+habitConsistency(h),0)/S.habits.length);return mo>=70?'in full bloom 🌸':mo>=40?'growing steadily 🌿':mo>0?'just budding 🌱':'resting';}
function trackerGraphAll(){const allDates=Object.keys(S.trackerLog).sort();if(!allDates.length)return '<div class="empty">Save a tracker reading on Home to start your graph.</div>';
  const stepX=42;const W=Math.max(320,26+8+(allDates.length-1)*stepX);const H=170,padL=26,padR=8,padT=10,padB=22;const innerW=W-padL-padR,innerH=H-padT-padB;
  const xOf=allDates.length===1?()=>padL+innerW/2:i=>padL+i*innerW/(allDates.length-1);const yOf=p=>padT+(1-p)*innerH;
  let grid='';[0,.25,.5,.75,1].forEach(p=>{const y=yOf(p);grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/><text x="${padL-4}" y="${y+3}" text-anchor="end" class="graph-axis">${p*100|0}%</text>`;});
  let xlab='';const idxs=allDates.length<=6?allDates.map((_,i)=>i):[0,Math.floor(allDates.length/2),allDates.length-1];idxs.forEach(i=>{xlab+=`<text x="${xOf(i)}" y="${H-7}" text-anchor="middle" class="graph-axis">${esc(fmtShort(allDates[i]))}</text>`;});
  let lines='';S.trackers.forEach(tr=>{const pts=[];allDates.forEach((dt,i)=>{const raw=S.trackerLog[dt][tr.id];if(raw!=null){pts.push([xOf(i),yOf(clamp(raw/tr.max,0,1)),dt,raw]);}});
    if(pts.length>1)lines+=`<polyline fill="none" stroke="${tr.color}" stroke-width="2.5" stroke-opacity="0.8" stroke-linecap="round" stroke-linejoin="round" points="${pts.map(p=>p[0]+','+p[1]).join(' ')}"/>`;
    lines+=pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="${tr.color}" fill-opacity="0.5" stroke="${tr.color}" stroke-width="1.5" data-act="graph-pt" data-info="${esc(fmtShort(p[2])+' · '+tr.name+': '+p[3]+'/'+tr.max)}"/>`).join('');});
  return `<div class="gwrap"><svg viewBox="0 0 ${W} ${H}" style="width:${W>340?W+'px':'100%'};max-width:none">${grid}${xlab}${lines}</svg></div><div class="legend">${S.trackers.map(tr=>`<span class="pill"><i class="tag-dot" style="background:${tr.color}"></i>${tr.emoji} ${esc(tr.name)} /${tr.max}</span>`).join('')}</div><p class="muted small" style="margin:6px 0 0">Tap a dot for its value · lines show % of each tracker's max · scroll sideways for more days.</p>`;}
function habitHeatmap(h){let cells='';const t=new Date();for(let i=27;i>=0;i--){const dd=new Date(t.getTime()-i*864e5);const k=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');cells+=`<div title="${k}" style="width:100%;aspect-ratio:1;border-radius:4px;background:${habitDone(h,k)?aspectHex(h.aspect):'var(--bg-2)'}"></div>`;}return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${cells}</div>`;}

function promptSheet(title,fields,onSave,initial={}){const body=fields.map(f=>{const val=initial[f.k]!=null?initial[f.k]:'';

  $('#modal-root')._onSave=()=>{const mr=$('#modal-root');const data={...initial};mr.querySelectorAll('[data-f]').forEach(el=>data[el.dataset.f]=el.value.trim());mr.querySelectorAll('[data-fchips]').forEach(c=>{const on=c.querySelector('.chip.on');data[c.dataset.fchips]=on?on.dataset.fchip:'';});mr.querySelectorAll('[data-fdays]').forEach(c=>{data[c.dataset.fdays]=[...c.querySelectorAll('.chip.on')].map(x=>x.dataset.fday);});mr.querySelectorAll('[data-fclock]').forEach(w=>data[w.dataset.fclock]=readClock(w));mr.querySelectorAll('[data-fdur]').forEach(w=>data[w.dataset.fdur]=readDuration(w));mr.querySelectorAll('[data-clockopt-en]').forEach(cb=>{if(!cb.checked)data[cb.dataset.clockoptEn]='';});mr.querySelectorAll('[data-asfield]').forEach(f=>data[f.dataset.asfield]=readAspSkill(f));mr.querySelectorAll('[data-tagfield]').forEach(f=>data[f.dataset.tagfield]=readTags(f));onSave(data);closeSheet();};}

function openGoalCreator(editId,preset={}){const g=editId?S.goals.find(x=>x.id===editId):null;

function bytesToB64(bytes){let bin='';const ch=0x8000;for(let i=0;i<bytes.length;i+=ch)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));return btoa(bin);}
function b64ToBytes(b64){const bin=atob(b64.replace(/\s/g,''));const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function makeCode(){const json=JSON.stringify(S);try{if('CompressionStream'in window){const cs=new CompressionStream('gzip');const buf=await new Response(new Blob([json]).stream().pipeThrough(cs)).arrayBuffer();return 'BLZ1:'+bytesToB64(new Uint8Array(buf));}}catch(e){}return 'B64:'+bytesToB64(new TextEncoder().encode(json));}
async function readCode(code){code=(code||'').trim();
  if(code.startsWith('BLZ1:')){const ds=new DecompressionStream('gzip');const txt=await new Response(new Blob([b64ToBytes(code.slice(5))]).stream().pipeThrough(ds)).text();return JSON.parse(txt);}
  if(code.startsWith('B64:'))return JSON.parse(new TextDecoder().decode(b64ToBytes(code.slice(4))));
  return JSON.parse(code);}
async function copyCode(){let code;try{code=await makeCode();}catch(e){toast('⚠ Could not build code');return;}
  try{await navigator.clipboard.writeText(code);toast('📋 Code copied — paste it anywhere');}
  catch(e){sheet(`<h2>📋 Your Blossom code</h2><p class="muted small">Select all & copy this, keep it safe, paste on any device/version.</p><textarea class="input" style="min-height:170px" onclick="this.select()">${esc(code)}</textarea><button class="btn primary block" style="margin-top:10px" data-act="cancel-sheet">Done</button>`);}}
function pasteCodeSheet(){sheet(`<h2>📥 Paste a Blossom code</h2><p class="muted small">Paste a code (or the contents of a save file). This replaces the data on this device — copy your own code first if unsure.</p><textarea class="input" id="codeIn" style="min-height:170px" placeholder="BLZ1:…"></textarea><div class="row" style="margin-top:10px"><button class="btn" data-act="cancel-sheet">Cancel</button><button class="btn primary" data-act="do-import-code">Import</button></div>`);}
async function doImportCode(){const ta=$('#codeIn');if(!ta)return;const code=ta.value.trim();if(!code){toast('Paste a code first');return;}
  let data;try{data=await readCode(code);}catch(e){toast('⚠ Invalid code');return;}
  if(!data||(!data.notes&&!data.habits&&!data.aspects)){toast('⚠ Invalid code');return;}
  if(confirm('Import this code? It replaces your current data on this device.')){S=migrate(Object.assign(DEFAULT(),data));saveNow();closeSheet();applyTheme();render();startParticles();toast('✓ Imported');}}
function startReview(type='weekly'){const stats=weekStats();sheet(`<h2>🌙 Weekly Review</h2><div class="kpi" style="margin-bottom:14px"><div class="k"><b>${stats.habitPct}%</b><small>Habits</small></div><div class="k"><b>${stats.checkins}</b><small>Check-ins</small></div><div class="k"><b>${stats.avgMood}</b><small>Avg mood</small></div></div><div class="field"><label>🌱 What grew?</label><textarea class="input" data-rev="grew"></textarea></div><div class="field"><label>🥀 What wilted?</label><textarea class="input" data-rev="wilted"></textarea></div><div class="field"><label>🌾 Carry forward?</label><textarea class="input" data-rev="carry"></textarea></div><button class="btn primary block" data-act="save-review" data-type="${type}">Save reflection</button>`);}
function weekStats(){const days=[];for(let i=0;i<7;i++)days.push(dateAdd(todayStr(),-i));let checkins=0;S.habits.forEach(h=>days.forEach(d=>{if(h.logs[d])checkins++;}));const possible=S.habits.length*7||1;const moods=days.map(d=>S.trackerLog[d]&&S.trackerLog[d].mood).filter(v=>v!=null);const avgMood=moods.length?(moods.reduce((a,b)=>a+b,0)/moods.length).toFixed(1):'–';return{habitPct:Math.round(checkins/possible*100),checkins,avgMood};}

/* ===== 8. EVENTS ===== */
function editorHtml(ed){const c=ed.cloneNode(true);c.querySelectorAll('img[data-img]').forEach(im=>im.removeAttribute('src'));return c.innerHTML;}
function flushEditor(){const ed=document.querySelector('.docedit');if(ed){const o=ownerOf(ed.dataset.owner,ed.dataset.oid);if(o){o.html=editorHtml(ed);touch(o);saveNow();}}}
function resolveImages(){document.querySelectorAll('#screen img[data-img], #modal-root img[data-img]').forEach(img=>{if(img.getAttribute('src'))return;idbGet('img:'+img.dataset.img).then(blob=>{if(blob)img.src=URL.createObjectURL(blob);});});}
async function migrateImages(){let changed=false;const conv=async(o)=>{if(!o.html||o.html.indexOf('data:image')<0)return;const div=document.createElement('div');div.innerHTML=o.html;for(const im of [...div.querySelectorAll('img[src^="data:image"]')]){try{const blob=await (await fetch(im.getAttribute('src'))).blob();const iid=uid();await idbPut('img:'+iid,blob);im.removeAttribute('src');im.setAttribute('data-img',iid);changed=true;}catch(e){}}o.html=div.innerHTML;};
  for(const n of S.notes)await conv(n);for(const j of S.journal)await conv(j);
  if(changed){S.meta.imgMigrated=true;saveNow();render();}else S.meta.imgMigrated=true;}
let _peekId=null;
function showPeek(node,act){let name='',sub='';
  if(act==='open-petal'){const fp=findPetal(node.dataset.petal);if(fp){name=fp.petal.name;sub='Petal · Lv '+levelFromXp(petalXP(fp.petal));}}
  else if(act==='open-skill'){const fs=findSkill(node.dataset.skill);if(fs){name=fs.skill.name;sub='Skill · Lv '+levelFromXp(skillXP(fs.skill.id));}}
  else{const k=node.dataset.aspect;name=AS(k).name;sub='Blossom · Lv '+levelFromXp(aspectXP(k));}
  let tip=document.getElementById('peekTip');if(!tip){tip=document.createElement('div');tip.id='peekTip';tip.className='peek-tip';document.body.appendChild(tip);}
  tip.innerHTML=`<b>${esc(name||'?')}</b><span>${esc(sub)} · tap again to open</span>`;tip.style.display='block';
  const r=node.getBoundingClientRect(),tw=tip.offsetWidth,th=tip.offsetHeight;
  let x=Math.max(8,Math.min(innerWidth-tw-8,r.left+r.width/2-tw/2)),y=r.top-th-8;if(y<8)y=r.bottom+8;
  tip.style.left=x+'px';tip.style.top=y+'px';}
function clearPeek(){_peekId=null;const t=document.getElementById('peekTip');if(t)t.style.display='none';}
document.addEventListener('click',e=>{

  if(S.settings.editLabels){const lab=e.target.closest('#screen .section-h h3, #screen .empty');if(lab){const def=lab.dataset.def!==undefined?lab.dataset.def:lab.textContent;promptSheet('Rename label',[{k:'text',label:'Text (include emoji you want)'}],d=>{if(d.text===''||d.text===def)delete S.labels[def];else S.labels[def]=d.text;save();render();},{text:S.labels[def]!==undefined?S.labels[def]:def});return;}}
  if(!S.settings.editLabels&&!homeEditing){const sh=e.target.closest('#screen .hsec>.section-h');if(sh&&!e.target.closest('[data-act]')&&sh.parentElement.classList.contains('hsec')){const sid=sh.parentElement.dataset.hsec;S.home.collapsed=S.home.collapsed||[];const i=S.home.collapsed.indexOf(sid);if(i>=0)S.home.collapsed.splice(i,1);else S.home.collapsed.push(sid);save();render();return;}}
  const el=e.target.closest('[data-act]');if(!el){if(_peekId)clearPeek();return;}const a=el.dataset.act,id=el.dataset.id;

  const od=el.dataset.owner!=null?el:el.closest('[data-owner]');const ownerT=od?od.dataset.owner:undefined,oid=od?od.dataset.oid:undefined;
  if(a==='doc-edit')return; // editing
  switch(a){

    case 'open-settings':openSettings();break;
    case 'close-sheet':if(e.target.closest('.sheet'))break;if($('#modal-root')._onSettingsSave)$('#modal-root')._onSettingsSave();closeSheet();break;
    case 'sheet-save':$('#modal-root')._onSave&&$('#modal-root')._onSave();break;
    case 'cancel-sheet':closeSheet();break;
    case 'edit-quote':promptSheet('Edit your quote',[{k:'quote',label:'Quote / principle',type:'textarea'}],d=>{S.profile.quote=d.quote||S.profile.quote;save();render();},{quote:S.profile.quote});break;

    /* today focus */
    case 'pick-focus':{const ag=agendaFor(todayStr()).filter(a=>a.kind==='habit'||a.kind==='todo'||a.kind==='goaltask');if(!ag.length){toast('Add a habit or task first');break;}sheet(`<h2>🌟 Today's focus</h2><p class="muted small">Pick one thing to gently centre on.</p>${ag.map(a=>`<div class="menu-item" data-act="set-focus" data-id="${a.id}"><span class="mi-ic">${a.kind==='habit'?'🔥':a.kind==='goaltask'?'🎯':'✅'}</span>${esc(a.text)}</div>`).join('')}`);}break;
    case 'set-focus':S.settings.focusId=id;S.settings.focusDate=todayStr();save();closeSheet();render();break;
    case 'clear-focus':S.settings.focusId='';save();render();break;

    case 'qc-goal':closeSheet();openGoalCreator(null,{});break;

    case 'qc-template':openTemplates();break;
    case 'apply-template':applyTemplate(parseInt(el.dataset.i));break;

    case 'home-customize':homeEditing=!homeEditing;render();break;
    case 'home-up':{const o=S.home.order,i=o.indexOf(id);if(i>0){o.splice(i-1,0,o.splice(i,1)[0]);save();render();}}break;

    case 'home-add-section':promptSheet('New section',[{k:'title',label:'Section name',placeholder:'e.g. Water log'},{k:'emoji',label:'Emoji',placeholder:'💧'}],d=>{if(d.title){const n=addNote(null,d.title);n.icon=(d.emoji||'⭐').slice(0,2);const cid='c_'+uid();S.home.custom.push({id:cid,title:d.title,emoji:(d.emoji||'⭐').slice(0,2),noteId:n.id});S.home.order.push(cid);save();render();}});break;
    case 'home-edit-section':{const c=S.home.custom.find(x=>x.id===id);if(!c)break;promptSheet('Edit section',[{k:'title',label:'Name'},{k:'emoji',label:'Emoji'}],d=>{c.title=d.title||c.title;c.emoji=(d.emoji||c.emoji).slice(0,2);const n=getNote(c.noteId);if(n){n.title=c.title;n.icon=c.emoji;}save();render();},{title:c.title,emoji:c.emoji});}break;
    case 'home-del-section':{if(confirm('Remove this section? (its page is kept in Notes)')){S.home.custom=S.home.custom.filter(x=>x.id!==id);S.home.order=S.home.order.filter(x=>x!==id);S.home.hidden=S.home.hidden.filter(x=>x!==id);save();render();}}break;

    /* notes */
    case 'all-notes':go({screen:'notes'});break;
    case 'open-note':go({screen:'note',id});break;
    case 'new-quicknote':{const n=addNote(el.dataset.parent||null);go({screen:'note',id:n.id});}break;
    case 'new-note-here':newPageSheet(el.dataset.parent||null);break;
    case 'new-page-tpl':createFromTemplate(el.dataset.tpl,el.dataset.parent||null);break;
    case 'toggle-outline':{const n=getNote(id);n._olOpen=!n._olOpen;render();}break;
    case 'outline-jump':{const hs=document.querySelectorAll('.docedit h1,.docedit h2,.docedit h3');const h=hs[+el.dataset.h];if(h)h.scrollIntoView({behavior:'smooth',block:'center'});}break;
    case 'set-accent':{const n=getNote(id);n.accent=el.dataset.color||'';touch(n);save();closeSheet();render();}break;
    case 'fig-align':{const fig=el.closest('figure.doc-fig');if(fig){const order=['al-center','al-right','al-left'];let cur=order.findIndex(c=>fig.classList.contains(c));cur=(cur+1)%order.length;fig.classList.remove('al-left','al-center','al-right');fig.classList.add(order[cur]);flushEditor();}}break;
    case 'note-mode':break;
    case 'note-tag':{const n=getNote(id),t=el.dataset.tag;n.tags=n.tags.includes(t)?n.tags.filter(x=>x!==t):[...n.tags,t];touch(n);save();render();}break;
    case 'note-tagid':{const n=getNote(id),t=el.dataset.tag;n.tagIds=n.tagIds||[];n.tagIds=n.tagIds.includes(t)?n.tagIds.filter(x=>x!==t):[...n.tagIds,t];touch(n);save();render();}break;
    case 'note-menu':noteMenu(id);break;
    case 'note-pin':{const n=getNote(id);n.pinned=!n.pinned;touch(n);save();closeSheet();render();}break;
    case 'note-icon':{const n=getNote(id);promptSheet('Page icon (emoji)',[{k:'icon',label:'Paste an emoji'}],d=>{if(d.icon)n.icon=d.icon.trim().slice(0,2);touch(n);save();render();},{icon:n.icon});}break;
    case 'note-accent':accentSheet(id);break;
    case 'note-copy':{const n=getNote(id);const d=document.createElement('div');d.innerHTML=n.html||'';const txt=(n.title?n.title+'\n\n':'')+(d.textContent||'').replace(/\n{3,}/g,'\n\n').trim();(navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(txt):Promise.reject()).then(()=>toast('📋 Copied as text')).catch(()=>toast('Copy not available'));closeSheet();}break;
    case 'note-delete':if(confirm('Delete this page and everything inside it?')){deleteNoteTree(id);save();closeSheet();back();}break;
    case 'new-skill-entry':{const n=addNote(el.dataset.skillRoot);go({screen:'note',id:n.id});}break;
    case 'note-search':break;

    /* doc editor */
    case 'doc-cmd':{const ed=$('.docedit');ed&&ed.focus();try{document.execCommand('styleWithCSS',false,true);document.execCommand(el.dataset.cmd,false,el.dataset.arg||null);}catch(_){}flushEditor();}break;
    case 'doc-check':{const ed=$('.docedit');ed&&ed.focus();document.execCommand('insertHTML',false,'<div class="todo-line"><input type="checkbox"><span>&nbsp;</span></div>');flushEditor();}break;
    case 'doc-toggle':{const ed=$('.docedit');ed&&ed.focus();document.execCommand('insertHTML',false,'<div class="ntoggle"><div class="ntg-head"><button class="ntg-fold" contenteditable="false" data-act="doc-fold" onmousedown="event.preventDefault()">▾</button><div class="ntg-title">Toggle</div></div><div class="ntg-body"><p>Details… press Enter for a new line</p></div></div><p><br></p>');flushEditor();}break;

    case 'doc-insert-link':{restoreSel();const n=getNote(id);const ed=$('.docedit');ed&&ed.focus();const lbl=(((n&&n.icon)||'📄')+' ')+esc(n?n.title||'Untitled':'Page');document.execCommand('insertHTML',false,`<a class="subpage" data-act="open-subpage" data-id="${id}" contenteditable="false">${lbl}</a>&nbsp;`);flushEditor();closeSheet();}break;

    case 'cobj-del':{const stage=document.querySelector('.docstage.drawing');if(!stage)break;const o=ownerOf(stage.dataset.owner,stage.dataset.oid);const oid2=el.dataset.objid;snapState(o);o.objects=(o.objects||[]).filter(x=>x.id!==oid2);const ce=stage.querySelector(`.cobj[data-objid="${oid2}"]`);if(ce)ce.remove();deselectObj();saveNow();}break;
    case 'draw-zoom':{const stage=document.querySelector('.docstage.drawing');if(!stage)break;const o=ownerOf(stage.dataset.owner,stage.dataset.oid);if(!o)break;const r=stage.getBoundingClientRect();if(el.dataset.z==='reset'){o.view={x:0,y:0,z:1};applyDrawView(stage,o);}else{zoomAround(stage,o,o.view.z*(el.dataset.z==='in'?1.25:1/1.25),r.left+r.width/2,r.top+r.height/2);}saveNowDebounced();}break;
    case 'draw-undo':{const stage=document.querySelector('.docstage.drawing');if(!stage||!drawUndo.length)break;const o=ownerOf(stage.dataset.owner,stage.dataset.oid);drawRedo.push(JSON.stringify({s:o.strokes||[],o:o.objects||[]}));restoreState(stage,o,drawUndo.pop());deselectObj();saveNow();}break;
    case 'draw-redo':{const stage=document.querySelector('.docstage.drawing');if(!stage||!drawRedo.length)break;const o=ownerOf(stage.dataset.owner,stage.dataset.oid);drawUndo.push(JSON.stringify({s:o.strokes||[],o:o.objects||[]}));restoreState(stage,o,drawRedo.pop());deselectObj();saveNow();}break;

    case 'edit-todo':{const td=S.todos.find(x=>x.id===id);if(!td)break;promptSheet('Edit task',[{k:'text',label:'Task'},{k:'as',label:'',type:'aspectskill'},{k:'date',label:'Date (one-off)',type:'date'},{k:'days',label:'…or repeat on these days',type:'days'},{k:'time',label:'Time',type:'clockopt'},{k:'del',label:'Type DELETE to remove this task'}],d=>{if((d.del||'').toUpperCase()==='DELETE'){S.todos=S.todos.filter(x=>x.id!==id);save();render();return;}td.text=d.text;const as=d.as||{};const sk=as.skillIds||[];td.aspects=deriveBlossoms(as.aspects,sk);td.aspect=td.aspects[0]||'';td.skillIds=sk;td.date=d.date||td.date;td.days=d.days||[];td.time=d.time||'';save();render();},{text:td.text,as:{aspects:itemAspects(td),skillIds:td.skillIds||[]},date:td.date,days:td.days||[],time:td.time||''});}break;

    /* habits */
    case 'checkin':{const h=S.habits.find(x=>x.id===id);const dd=el.dataset.date||todayStr();const rep=habitRepeat(h);const cur=h.logs[dd]||0;const wasDone=cur>=rep;const next=cur>=rep?0:cur+1;const nowDone=next>=rep;if(next===0)delete h.logs[dd];else h.logs[dd]=next;if(nowDone&&!wasDone){gainItemXP(h,xpWeight(h));playChime();}if(!nowDone&&wasDone)gainItemXP(h,-xpWeight(h));save();render();}break;

const pick=a=>a[Math.floor(Math.random()*a.length)];const rnd=([a,b])=>a+Math.random()*(b-a);
let particles=[],pRAF=null;const pcanvas=$('#particles'),pctx=pcanvas.getContext('2d');

function sizeCanvas(){pcanvas.width=innerWidth;pcanvas.height=innerHeight;fxcanvas.width=innerWidth;fxcanvas.height=innerHeight;}

// emoji are cached to offscreen canvases (drawImage is far cheaper than fillText every frame)
const _spriteCache={};

function drawSparkle(ctx,x,y,r,a,color){if(a<=0.01)return;ctx.save();ctx.translate(x,y);ctx.globalAlpha=a;ctx.fillStyle=color;
  const lo=r,sh=r*0.3;ctx.beginPath();ctx.moveTo(0,-lo);ctx.lineTo(sh,-sh);ctx.lineTo(lo,0);ctx.lineTo(sh,sh);ctx.lineTo(0,lo);ctx.lineTo(-sh,sh);ctx.lineTo(-lo,0);ctx.lineTo(-sh,-sh);ctx.closePath();ctx.fill();
  ctx.globalAlpha=a*0.55;ctx.beginPath();ctx.arc(0,0,r*0.26,0,6.28);ctx.fill();ctx.restore();ctx.globalAlpha=1;}
function spawnClickBurst(x,y){const ce=(S.settings.clickEmoji||'').trim();const emoji=!!ce;const cc=(S.settings.clickColor||'').trim();const cols=cc?[cc]:['#fff6cc','#ffffff','#cdb4ff','#ffd58a'];const spd=S.settings.clickSpeed||1;const n=Math.max(1,Math.min(40,S.settings.clickCount||10));

function stepFx(f){f.x+=f.vx*dtf;f.y+=f.vy*dtf;f.vy+=0.07*dtf;f.vx*=Math.pow(0.92,dtf);f.tw+=0.3*dtf;f.life-=f.decay*dtf;if(f.life<=0)return false;const a=Math.max(0,f.life);

  if(b==='snow')return{...base,y:init?Math.random()*h:-10,vy:0.5+Math.random(),sway:Math.random()*6.28,r:rnd(sp.size||[2,4]),a:0.4+Math.random()*0.5,color:pick(sp.colors||['#fff'])};

  if(b==='shoot')return{...base,x:Math.random()*w*0.7,y:-10,vx:0,vy:0,active:false,wait:Math.random()*220,a:0,speed:(5+Math.random()*4)*sp_,color:pick(sp.colors||['#fff'])};

function stepDraw(p){const w=pcanvas.width,h=pcanvas.height;

  if(p.b==='cloud'){p.x+=p.vx*dtf;if(p.vx<0&&p.x<-p.r*1.6)p.x=w+p.r;if(p.vx>0&&p.x>w+p.r*1.6)p.x=-p.r;const r=p.r;pctx.globalAlpha=p.a;pctx.fillStyle=p.color;

    pctx.beginPath();pctx.ellipse(p.x-r*0.45,p.y+r*0.12,r*0.42,r*0.3,0,0,6.28);pctx.fill();

    pctx.globalAlpha=1;return;}
  if(p.b==='shoot'){if(!p.active){p.wait-=dtf;if(p.wait<=0){p.active=true;p.x=Math.random()*w*0.75;p.y=-8;const ang=Math.PI*0.25+Math.random()*0.18;p.vx=Math.cos(ang)*p.speed;p.vy=Math.sin(ang)*p.speed;p.a=0.95;}return;}p.x+=p.vx*dtf;p.y+=p.vy*dtf;p.a-=0.006*dtf;if(p.x>w+40||p.y>h+40||p.a<=0){p.active=false;p.wait=140+Math.random()*300;return;}const tx=p.x-p.vx*6,ty=p.y-p.vy*6;const g=pctx.createLinearGradient(p.x,p.y,tx,ty);g.addColorStop(0,p.color);g.addColorStop(1,'rgba(255,255,255,0)');pctx.globalAlpha=Math.max(0,p.a);pctx.strokeStyle=g;pctx.lineWidth=2;pctx.beginPath();pctx.moveTo(p.x,p.y);pctx.lineTo(tx,ty);pctx.stroke();pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,1.8,0,6.28);pctx.fill();pctx.globalAlpha=1;return;}

function nextAlarmTimes(al,days){const out=[];const now=new Date();for(let i=0;i<days;i++){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);if(al.days&&al.days.length&&!al.days.includes(DOW[d.getDay()]))continue;const[h,m]=al.time.split(':').map(Number);const ts=new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m,0).getTime();if(ts>Date.now())out.push(ts);}return out;}
async function bgSync(){
  if(!('serviceWorker'in navigator))return;const reg=swReg||await navigator.serviceWorker.ready.catch(()=>null);if(!reg)return;
  const canTrigger=('showTrigger'in Notification.prototype)&&typeof TimestampTrigger!=='undefined'&&Notification.permission==='granted';
  if(!canTrigger)return; // unsupported browser -> in-app interval handles it while open
  // clear our previously scheduled (not-yet-fired) notifications, then reschedule
  try{const pend=await reg.getNotifications({includeTriggered:false});pend.forEach(n=>{if((n.tag||'').startsWith('al-')||(n.tag||'').startsWith('tm-'))n.close();});}catch(e){}
  for(const al of S.alarms){if(!al.enabled||al.sound===false)continue;for(const ts of nextAlarmTimes(al,8)){try{reg.showNotification('⏰ '+(al.label||'Alarm'),{body:new Date(ts).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}),tag:'al-'+al.id+'-'+ts,icon:'icon.svg',showTrigger:new TimestampTrigger(ts),requireInteraction:true});}catch(e){}}}
  for(const t of (S.timers||[])){if(t.running&&t.endAt&&t.endAt>Date.now()){try{reg.showNotification('⏲ '+(t.label||'Timer')+' finished',{tag:'tm-'+t.id+'-'+t.endAt,icon:'icon.svg',showTrigger:new TimestampTrigger(t.endAt)});}catch(e){}}}
  for(const e of S.events){if(e.remind===''||e.remind==null||!e.start)continue;const ts=new Date(e.date+'T'+e.start+':00').getTime()-(+e.remind)*60000;if(ts>Date.now()&&ts<Date.now()+8*864e5){try{reg.showNotification('📅 '+e.title,{body:(+e.remind?'in '+e.remind+' min':'now')+' · '+e.start,tag:'ev-'+e.id+'-'+ts,icon:'icon.svg',showTrigger:new TimestampTrigger(ts)});}catch(err){}}}
}
